<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#075E54">
<title>Les Fournisseurs Industriels du Maroc | Connect Industry</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  /* WhatsApp Dark Theme */
  --whatsapp-dark:#075E54;
  --whatsapp-teal:#128C7E;
  --whatsapp-light:#25D366;
  --whatsapp-bg-dark:#0B141A;
  --whatsapp-panel:#111B21;
  --whatsapp-header:#1F2C33;
  --whatsapp-input:#2A3942;
  --whatsapp-hover:#202C33;
  --whatsapp-outgoing:#005C4B;
  --whatsapp-incoming:#1F2C33;
  --whatsapp-text:#E9EDEF;
  --whatsapp-text-light:#8696A0;
  --whatsapp-border:#222E35;
}
body{
  background:var(--whatsapp-bg-dark);
  color:var(--whatsapp-text);
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}
body.light{
  --whatsapp-bg-dark:#EFF2F5;
  --whatsapp-panel:#FFFFFF;
  --whatsapp-header:#F0F2F5;
  --whatsapp-input:#F0F2F5;
  --whatsapp-hover:#F5F6F6;
  --whatsapp-outgoing:#D9FDD3;
  --whatsapp-incoming:#FFFFFF;
  --whatsapp-text:#111B21;
  --whatsapp-text-light:#667781;
  --whatsapp-border:#E9EDEF;
}

/* WhatsApp Status Bar */
.status-bar{
  position:fixed;top:0;left:0;right:0;height:44px;
  background:var(--whatsapp-header);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;z-index:400;font-size:0.85rem;font-weight:600;
  border-bottom:0.5px solid var(--whatsapp-border);
}
.status-bar-left{display:flex;gap:20px;}
.status-bar-left i{font-size:1.1rem;color:var(--whatsapp-text);}
.status-bar-center{font-weight:600;color:var(--whatsapp-text);}
.status-bar-right{display:flex;gap:20px;}
.status-bar-right i{font-size:1.1rem;color:var(--whatsapp-text);}

/* Chat Header */
.chat-header{
  position:fixed;top:44px;left:0;right:0;height:56px;
  background:var(--whatsapp-header);
  display:flex;align-items:center;
  padding:0 12px;z-index:400;gap:12px;
  border-bottom:0.5px solid var(--whatsapp-border);
}
.header-avatar{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;cursor:pointer;
  background:var(--whatsapp-teal);
  display:flex;align-items:center;justify-content:center;
  font-weight:600;color:#fff;font-size:0.9rem;
}
.header-info{flex:1;min-width:0;}
.header-name{
  font-weight:600;color:var(--whatsapp-text);font-size:0.9rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.header-sub{
  font-size:0.55rem;color:var(--whatsapp-text-light);margin-top:2px;
}
.header-actions{display:flex;align-items:center;gap:8px;}
.hbtn{
  width:36px;height:36px;border-radius:50%;
  background:transparent;border:none;cursor:pointer;
  color:var(--whatsapp-text);display:flex;align-items:center;
  justify-content:center;font-size:1rem;transition:.15s;
}
.hbtn:hover{background:rgba(255,255,255,0.08);}
#appTime{font-size:0.6rem;color:var(--whatsapp-text-light);}

/* Bottom Navigation (WhatsApp Style) */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:56px;
  background:var(--whatsapp-panel);
  display:flex;
  z-index:400;
  border-top:0.5px solid var(--whatsapp-border);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;background:transparent;border:none;
  cursor:pointer;color:var(--whatsapp-text-light);transition:.15s;
  font-size:0.55rem;
}
.nav-item i{font-size:1.1rem;margin-bottom:2px;}
.nav-item.active{color:var(--whatsapp-light);}
.admin-only{display:none!important;}
body.admin-mode .admin-only{display:flex!important;}

.main{
  padding-top:100px;
  padding-bottom:56px;
  min-height:100vh;
}
.section{display:none;padding:0 12px;}
.section.active{display:block;}

/* WhatsApp Banner */
.whatsapp-banner{
  background:linear-gradient(135deg,var(--whatsapp-dark) 0%,var(--whatsapp-teal) 100%);
  margin:-12px -12px 16px -12px;
  padding:24px 20px 28px;
  position:relative;overflow:hidden;
  border-radius:0 0 24px 24px;
}
.whatsapp-banner::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 30% 20%, rgba(255,255,255,0.05) 0%, transparent 60%);
}
.whatsapp-banner h1{
  font-size:1.1rem;font-weight:600;color:#fff;position:relative;
  display:flex;align-items:center;gap:8px;
}
.whatsapp-banner h1 i{font-size:1.2rem;}
.whatsapp-banner p{
  font-size:0.6rem;color:rgba(255,255,255,0.7);margin-top:6px;
}

/* Stats Cards (WhatsApp Style) */
.stats-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px;
}
.stat-card{
  background:var(--whatsapp-panel);border-radius:12px;
  padding:10px 12px;
  display:flex;align-items:center;gap:10px;
  border:0.5px solid var(--whatsapp-border);
  transition:.2s;cursor:pointer;
}
.stat-card:hover{border-color:var(--whatsapp-light);background:var(--whatsapp-hover);}
.stat-card:active{transform:scale(0.98);}
.stat-card-icon{
  width:40px;height:40px;border-radius:10px;
  background:rgba(37,211,102,0.12);
  display:flex;align-items:center;
  justify-content:center;color:var(--whatsapp-light);font-size:1rem;flex-shrink:0;
}
.stat-num{font-size:1.2rem;font-weight:700;color:var(--whatsapp-text);line-height:1;}
.stat-lbl{font-size:0.5rem;color:var(--whatsapp-text-light);text-transform:uppercase;letter-spacing:.3px;margin-top:2px;}

/* Search Bar (WhatsApp Style) */
.search-bar{
  background:var(--whatsapp-panel);padding:8px 0;
  position:sticky;top:100px;
  border-bottom:0.5px solid var(--whatsapp-border);z-index:100;
}
.search-container{
  display:flex;align-items:center;gap:8px;
  background:var(--whatsapp-input);border-radius:24px;
  padding:8px 14px;
}
.search-container i{color:var(--whatsapp-text-light);font-size:0.75rem;}
.search-container input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--whatsapp-text);font-size:0.75rem;font-family:inherit;
}
.search-container input::placeholder{color:var(--whatsapp-text-light);}
.search-clear{
  width:20px;height:20px;border-radius:50%;
  background:var(--whatsapp-text-light);border:none;cursor:pointer;
  color:var(--whatsapp-bg-dark);display:none;align-items:center;
  justify-content:center;font-size:0.55rem;
}
.search-active .search-clear{display:flex;}

/* Filter Chips */
.filter-row{
  display:flex;gap:6px;padding:8px 0;
  overflow-x:auto;background:var(--whatsapp-panel);
  border-bottom:0.5px solid var(--whatsapp-border);
}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--whatsapp-input);border:0.5px solid var(--whatsapp-border);
  border-radius:20px;padding:4px 12px;cursor:pointer;
  color:var(--whatsapp-text-light);font-size:0.6rem;font-weight:500;
  white-space:nowrap;transition:.15s;flex-shrink:0;
}
.filter-chip i{font-size:0.6rem;}
.filter-chip:hover{border-color:var(--whatsapp-light);color:var(--whatsapp-light);}
.filter-chip.active{background:var(--whatsapp-light);color:#fff;border-color:var(--whatsapp-light);}
.filter-chip.reset:hover{border-color:#e53935;color:#e53935;}

.active-filters{
  display:flex;gap:5px;flex-wrap:wrap;padding:6px 0;
  background:var(--whatsapp-panel);
}
.filter-tag{
  background:rgba(37,211,102,0.12);padding:2px 8px;border-radius:20px;
  font-size:0.55rem;color:var(--whatsapp-light);
  display:inline-flex;align-items:center;gap:4px;
}
.filter-tag button{background:none;border:none;cursor:pointer;color:var(--whatsapp-light);font-size:0.6rem;}

.result-info{
  background:var(--whatsapp-input);padding:6px 12px;font-size:0.6rem;
  color:var(--whatsapp-text-light);display:none;align-items:center;gap:6px;
  border-bottom:0.5px solid var(--whatsapp-border);
}
.result-info.visible{display:flex;}

/* Contact List (WhatsApp Style) */
.contact-item{
  display:flex;align-items:center;
  padding:10px 0;border-bottom:0.5px solid var(--whatsapp-border);
  cursor:pointer;gap:12px;transition:.12s;
}
.contact-item:hover{background:var(--whatsapp-hover);}
.contact-item:active{transform:scale(0.99);}
.contact-avatar{
  width:48px;height:48px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;
  font-weight:600;font-size:0.9rem;color:#fff;flex-shrink:0;
}
.contact-info{flex:1;min-width:0;}
.contact-name{font-weight:500;font-size:0.85rem;color:var(--whatsapp-text);}
.contact-details{
  font-size:0.6rem;color:var(--whatsapp-text-light);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.contact-badges{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}
.badge{
  font-size:0.4rem;padding:1px 6px;border-radius:20px;font-weight:500;
}
.badge-fourn{background:rgba(37,211,102,0.12);color:#77b255;}
.badge-expert{background:rgba(43,150,209,0.12);color:#2b96d1;}
.badge-service{background:rgba(37,211,102,0.12);color:#77b255;}
.badge-product{background:rgba(255,159,74,0.12);color:#ff9f4a;}
.badge-maqola{background:rgba(255,159,74,0.12);color:#ff9f4a;}
.badge-yad{background:rgba(167,125,203,0.12);color:#a77dcb;}

/* Modal (Centered WhatsApp Style) */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:800;
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transition:.2s;padding:16px;
}
.modal-overlay.show{opacity:1;visibility:visible;}
.modal-container{
  background:var(--whatsapp-panel);width:100%;max-width:340px;
  border-radius:24px;overflow:hidden;
  animation:modalPop .2s ease;max-height:85vh;overflow-y:auto;
}
@keyframes modalPop{from{transform:scale(0.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-header{background:var(--whatsapp-header);padding:20px 16px 16px;text-align:center;position:relative;}
.modal-close{
  position:absolute;top:12px;right:12px;width:32px;height:32px;
  border-radius:50%;background:rgba(255,255,255,0.08);border:none;
  cursor:pointer;color:var(--whatsapp-text-light);font-size:0.75rem;
}
.modal-avatar{
  width:70px;height:70px;border-radius:50%;margin:0 auto 8px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;font-weight:600;color:#fff;
}
.modal-name{font-size:1.05rem;font-weight:600;color:var(--whatsapp-text);}
.modal-type{font-size:0.6rem;color:var(--whatsapp-text-light);margin-top:3px;}
.modal-badges{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
.modal-body{padding:14px 16px;}
.modal-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--whatsapp-border);}
.modal-row:last-child{border-bottom:none;}
.modal-icon{width:32px;color:var(--whatsapp-light);font-size:0.85rem;text-align:center;}
.modal-row-label{font-size:0.5rem;color:var(--whatsapp-text-light);text-transform:uppercase;margin-bottom:2px;}
.modal-row-value{font-size:0.75rem;color:var(--whatsapp-text);word-break:break-word;}
.modal-actions{
  display:flex;justify-content:center;gap:12px;
  padding:12px 16px 16px;border-top:0.5px solid var(--whatsapp-border);flex-wrap:wrap;
}
.modal-btn{
  min-width:54px;padding:6px 10px;border-radius:30px;
  background:var(--whatsapp-input);border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;transition:.2s;color:var(--whatsapp-text-light);
}
.modal-btn i{font-size:0.9rem;}
.modal-btn span{font-size:0.48rem;font-weight:500;}
.modal-btn:hover{transform:scale(0.96);background:var(--whatsapp-hover);}
.modal-btn.whatsapp{color:var(--whatsapp-light);}
.modal-btn.whatsapp:hover{background:rgba(37,211,102,0.12);}

/* Explorer (WhatsApp Style) */
.explorer-breadcrumb{
  background:var(--whatsapp-panel);padding:8px 0;
  display:flex;gap:6px;flex-wrap:wrap;border-bottom:0.5px solid var(--whatsapp-border);
}
.bc{font-size:0.65rem;font-weight:500;color:var(--whatsapp-text-light);cursor:pointer;}
.bc:hover{color:var(--whatsapp-light);}
.bc-sep{color:var(--whatsapp-text-light);}
.explorer-item{
  display:flex;align-items:center;padding:12px 0;
  background:var(--whatsapp-panel);border-bottom:0.5px solid var(--whatsapp-border);
  cursor:pointer;gap:12px;transition:.12s;
}
.explorer-item:hover{background:var(--whatsapp-hover);}
.explorer-icon{
  width:44px;height:44px;border-radius:50%;background:rgba(37,211,102,0.12);
  display:flex;align-items:center;justify-content:center;
  color:var(--whatsapp-light);font-size:1rem;flex-shrink:0;
}
.explorer-name{font-weight:500;color:var(--whatsapp-text);font-size:0.85rem;}
.explorer-count{font-size:0.55rem;color:var(--whatsapp-text-light);margin-top:2px;}
.explorer-arrow{color:var(--whatsapp-text-light);margin-left:auto;font-size:0.7rem;}

/* Sheet Modal (WhatsApp Style) */
.sheet-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:700;
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transition:.2s;
}
.sheet-overlay.show{opacity:1;visibility:visible;}
.sheet{
  background:var(--whatsapp-panel);width:100%;max-width:340px;
  border-radius:24px;max-height:85vh;overflow-y:auto;
}
.sheet-header{
  padding:14px 16px;border-bottom:0.5px solid var(--whatsapp-border);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:var(--whatsapp-panel);z-index:1;
}
.sheet-header h3{font-size:0.85rem;font-weight:600;color:var(--whatsapp-text);display:flex;align-items:center;gap:6px;}
.sheet-header h3 i{color:var(--whatsapp-light);}
.sheet-close{
  width:30px;height:30px;border-radius:50%;
  background:var(--whatsapp-input);border:none;cursor:pointer;
  color:var(--whatsapp-text-light);display:flex;align-items:center;
  justify-content:center;font-size:0.7rem;
}
.sheet-body{padding:14px;}
.form-group{margin-bottom:12px;}
.form-group label{font-size:0.55rem;font-weight:600;color:var(--whatsapp-text-light);margin-bottom:4px;display:block;}
.form-input{
  width:100%;background:var(--whatsapp-input);border:0.5px solid var(--whatsapp-border);
  border-radius:12px;padding:10px 12px;color:var(--whatsapp-text);
  font-size:0.75rem;outline:none;font-family:inherit;
}
.form-input:focus{border-color:var(--whatsapp-light);}
select.form-input{padding:10px;}
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:8px 16px;
  border-radius:30px;cursor:pointer;font-weight:500;border:none;
  transition:.15s;font-size:0.7rem;font-family:inherit;
}
.btn-primary{background:var(--whatsapp-light);color:#fff;}
.btn-primary:hover{opacity:0.85;}
.btn-ghost{background:var(--whatsapp-input);color:var(--whatsapp-text-light);}
.btn-danger{background:rgba(229,57,53,0.12);color:#e53935;}
.btn-full{width:100%;justify-content:center;}
.menu-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  cursor:pointer;border-bottom:0.5px solid var(--whatsapp-border);transition:.12s;
}
.menu-item:hover{background:var(--whatsapp-hover);}
.menu-icon{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:0.8rem;
}
.menu-label{font-size:0.8rem;color:var(--whatsapp-text);}

.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.85);color:#fff;border-radius:30px;
  padding:8px 16px;font-size:0.7rem;z-index:9000;
  opacity:0;visibility:hidden;transition:.25s;white-space:nowrap;
  backdrop-filter:blur(10px);
}
.toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(-4px);}
.loading-screen{
  position:fixed;inset:0;background:var(--whatsapp-bg-dark);z-index:9999;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;transition:.4s;
}
.loading-screen.hide{opacity:0;pointer-events:none;}
.loading-logo{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--whatsapp-dark),var(--whatsapp-light));
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;font-weight:700;color:#fff;
}
.loading-bar{width:120px;height:2px;background:var(--whatsapp-input);border-radius:99px;overflow:hidden;}
.loading-fill{width:40%;height:100%;background:var(--whatsapp-light);animation:load .9s ease infinite;}
@keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(250%)}}
.empty-state{text-align:center;padding:56px 20px;color:var(--whatsapp-text-light);}
.empty-icon{font-size:2.5rem;margin-bottom:10px;opacity:.5;}
.empty-title{font-size:0.85rem;font-weight:500;}
.empty-sub{font-size:0.65rem;margin-top:4px;opacity:.7;}
</style>
</head>
<body>

<!-- WhatsApp Style Status Bar -->
<div class="status-bar">
  <div class="status-bar-left">
    <i class="fas fa-wifi"></i>
    <i class="fas fa-signal"></i>
  </div>
  <div class="status-bar-center">9:41</div>
  <div class="status-bar-right">
    <i class="fas fa-battery-full"></i>
  </div>
</div>

<!-- WhatsApp Style Header -->
<div class="chat-header">
  <div class="header-avatar" id="headerAvatar" onclick="openAdminModal()">
    <i class="fas fa-user-shield"></i>
  </div>
  <div class="header-info">
    <div class="header-name" id="headerName">Fournisseurs Industrie</div>
    <div class="header-sub" id="headerSub">Maroc · B2B</div>
  </div>
  <div class="header-actions">
    <span id="appTime"></span>
    <button class="hbtn" id="themeBtn"><i class="fas fa-moon"></i></button>
  </div>
</div>

<!-- WhatsApp Style Bottom Navigation -->
<nav class="bottom-nav">
  <button class="nav-item active" data-sec="home"><i class="fas fa-home"></i><span>Accueil</span></button>
  <button class="nav-item" data-sec="explorer"><i class="fas fa-compass"></i><span>Explorer</span></button>
  <button class="nav-item" data-sec="repertoire"><i class="fas fa-users"></i><span>Répertoire</span></button>
  <button class="nav-item admin-only" id="addBtn"><i class="fas fa-plus-circle"></i><span>Ajouter</span></button>
  <button class="nav-item admin-only" id="syncBtn"><i class="fas fa-cloud-upload-alt"></i><span>Sync</span></button>
</nav>

<main class="main">

  <!-- HOME SECTION -->
  <div id="homeSection" class="section active">
    <div class="whatsapp-banner">
      <h1><i class="fab fa-whatsapp"></i> Les Fournisseurs Industriels</h1>
      <p>La plus grande communauté B2B au Maroc</p>
    </div>
    <div class="stats-grid">
      <div class="stat-card" onclick="filterByTypeFromStats('fournisseurs')">
        <div class="stat-card-icon"><i class="fas fa-industry"></i></div>
        <div><div class="stat-num" id="statFour">0</div><div class="stat-lbl">Fournisseurs</div></div>
      </div>
      <div class="stat-card" onclick="filterByTypeFromStats('experts')">
        <div class="stat-card-icon" style="background:rgba(43,150,209,0.12);color:#2b96d1"><i class="fas fa-microchip"></i></div>
        <div><div class="stat-num" id="statExp">0</div><div class="stat-lbl">Experts</div></div>
      </div>
      <div class="stat-card" onclick="filterByVilleFromStats()">
        <div class="stat-card-icon" style="background:rgba(255,159,74,0.12);color:#ff9f4a"><i class="fas fa-map-marker-alt"></i></div>
        <div><div class="stat-num" id="statVilles">0</div><div class="stat-lbl">Villes</div></div>
      </div>
      <div class="stat-card" onclick="filterByDomaineFromStats()">

<script>
// ==================== CONFIG ====================
const CSV_EXPERTS="https://docs.google.com/spreadsheets/d/e/2PACX-1vSjj2c3fjfHowy8yxOfpVAsfXLRVgSQPJQ7PVc4wvI2dI7g0hQwF32QoByKExzadiHivu3oKYRpgWKK/pub?gid=42570462&single=true&output=csv";
const CSV_FOURNISSEURS="https://docs.google.com/spreadsheets/d/e/2PACX-1vT9oFi63lhgtX8h-DstURguy8B5Vv6GmzTqDWIWSEVXDcicvyeZd7iyVX8gZ2ldtMC8YRRVsUOzG92G/pub?gid=587124901&single=true&output=csv";
const ADMIN_PASSWORD="admin123";

const firebaseConfig={
  apiKey:"AIzaSyBQKPqut41Jqs28Zn_z-I_ffD-iNCnFpdU",
  authDomain:"said-rahil-default-rtdb.firebaseio.com",
  databaseURL:"https://said-rahil-default-rtdb.firebaseio.com/",
  projectId:"said-rahil",
  storageBucket:"said-rahil.firebasestorage.app"
};
firebase.initializeApp(firebaseConfig);
const dbRef=firebase.database();

// ==================== STATE ====================
let csvExperts=[],csvFournisseurs=[],dbData=[];
let isAdmin=false,currentSection='home';
let explorerStack=[];
let pendingDelete=null;
let repFilters={type:null,categorie:null,ville:null,domaine:null,search:''};

// ==================== HELPERS ====================
function $(id){return document.getElementById(id);}
function toast(msg){const t=$('toast');t.innerHTML=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function closeModal(id){$(id).classList.remove('show');}
function showLoading(v){v?$('loadingScreen').classList.remove('hide'):$('loadingScreen').classList.add('hide');}
function escHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function formatPhone(p){if(!p)return'';let c=String(p).replace(/[\s\-\(\)\.]/g,'');if(c.startsWith('00'))c='+'+c.slice(2);else if(c.startsWith('0'))c='+212'+c.slice(1);return c;}
function getInitials(name){const parts=(name||'').trim().split(/\s+/);return parts.slice(0,2).map(p=>p[0]||'').join('').toUpperCase()||'?';}
const COLORS=['#075E54','#128C7E','#25D366','#2b96d1','#77b255','#ff9f4a','#a77dcb','#e53935','#42a5f5','#ec407a'];
function getColor(name){let h=0;for(const c of name||'')h=(h*31+c.charCodeAt(0))&0xffff;return COLORS[h%COLORS.length];}
const catNameMap={services:'Services',products:'Produits',maqola:'Maqaola','yad-amila':'Yad Amila'};
const catClassMap={services:'badge-service',products:'badge-product',maqola:'badge-maqola','yad-amila':'badge-yad'};
const typeMap={'fournisseurs':'FOURNISSEURS','experts':'EXPERTS'};
const categoryMap={'services':'SERVICES','products':'PRODUITS','maqola':'MAQAOLA','yad-amila':'YAD AMILA'};

function normalizeStr(s){
  return String(s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .trim();
}

function fieldMatches(value,q){
  if(!value||!q)return false;
  return normalizeStr(String(value)).includes(normalizeStr(q));
}

// ==================== ADMIN ====================

  if(isAdmin){
    logoutAdmin();
  } else {
    $('adminModal').classList.add('show');
  }
}

    isAdmin=true;
    sessionStorage.setItem('adminMode','true');

    $('headerAvatar').innerHTML = '<i class="fas fa-user-shield"></i>';

    renderCurrent();

    toast('❌ Mot de passe incorrect');
  }
}

function logoutAdmin(){
  isAdmin=false;
  sessionStorage.removeItem('adminMode');
  document.body.classList.remove('admin-mode');
  $('headerAvatar').innerHTML = '<i class="fas fa-user-shield"></i>';
  $('headerName').textContent = 'Fournisseurs Industrie';
  toast('👤 Mode utilisateur');
  renderCurrent();

function checkAdminStatus(){
  if(sessionStorage.getItem('adminMode')==='true'){
    isAdmin=true;
    document.body.classList.add('admin-mode');
    $('headerAvatar').innerHTML = '<i class="fas fa-user-shield"></i>';
    $('headerName').textContent = 'Admin Mode';

}

// ==================== FILTRAGE PAR STATS ====================
function filterByTypeFromStats(type){
  resetRepFilters();
  if(type==='fournisseurs'){
    repFilters.type='fournisseurs';
    toast(`🔍 ${$('statFour').innerText} Fournisseurs`);
  } else if(type==='experts'){
    repFilters.type='experts';
    toast(`🔍 ${$('statExp').innerText} Experts`);
  }
  showSection('repertoire',true);
  renderRepertoire();
}

function filterByCategorieFromStats(categorie){
  resetRepFilters();
  let key='',name='';
  switch(categorie){
    case 'services': key='services'; name='Services'; break;
    case 'products': key='products'; name='Produits'; break;
    case 'maqola': key='maqola'; name='Maqaola'; break;
    case 'yad-amila': key='yad-amila'; name='Yad Amila'; break;
  }
  repFilters.categorie=key;
  toast(`🔍 ${name}`);
  showSection('repertoire',true);
  renderRepertoire();
}

function filterByVilleFromStats(){
  const villes=[...new Set(dbData.map(d=>d.ville).filter(v=>v&&v!=='null'&&v.trim()))];
  if(villes.length===0){toast('⚠️ Aucune ville');return;}
  showList('Villes',villes.sort(),(ville)=>{if(ville){resetRepFilters();repFilters.ville=ville;toast(`🔍 ${ville}`);showSection('repertoire',true);renderRepertoire();}});
}

function filterByDomaineFromStats(){
  const domaines=[...new Set(dbData.map(d=>d.domaine).filter(d=>d&&d!=='null'&&d.trim()))];
  if(domaines.length===0){toast('⚠️ Aucun domaine');return;}
  showList('Domaines',domaines.sort(),(domaine)=>{if(domaine){resetRepFilters();repFilters.domaine=domaine;toast(`🔍 ${domaine}`);showSection('repertoire',true);renderRepertoire();}});
}

// ==================== REPERTOIRE ====================
function getAvailableCategoriesForCurrentType(){
  let data=[...dbData];
  if(repFilters.type) data=data.filter(d=>d.type===repFilters.type);
  return[...new Set(data.map(d=>d.categorie).filter(c=>c))].map(c=>catNameMap[c]).filter(c=>c);
}

function getFilteredRepertoire(){
  let data=[...dbData];
  if(repFilters.type) data=data.filter(d=>d.type===repFilters.type);
  if(repFilters.categorie) data=data.filter(d=>d.categorie===repFilters.categorie);
  if(repFilters.ville) data=data.filter(d=>normalizeStr(d.ville)===normalizeStr(repFilters.ville));
  if(repFilters.domaine) data=data.filter(d=>normalizeStr(d.domaine)===normalizeStr(repFilters.domaine));
  if(repFilters.search&&repFilters.search.trim()){
    const q=repFilters.search.trim();
    data=data.filter(d=>fieldMatches(d.name,q)||fieldMatches(d.domaine,q)||fieldMatches(d.specialite,q)||fieldMatches(d.ville,q)||fieldMatches(d.phone,q)||fieldMatches(d.email,q)||fieldMatches(d.web,q));
  }
  return data.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
}

function getRepVilles(){
  let data=[...dbData];
  if(repFilters.type) data=data.filter(d=>d.type===repFilters.type);
  if(repFilters.categorie) data=data.filter(d=>d.categorie===repFilters.categorie);
  if(repFilters.domaine) data=data.filter(d=>d.domaine===repFilters.domaine);
  return[...new Set(data.map(d=>d.ville).filter(v=>v&&v!=='null'&&v.trim()))].sort((a,b)=>a.localeCompare(b));
}

function getRepDomaines(){
  let data=[...dbData];
  if(repFilters.type) data=data.filter(d=>d.type===repFilters.type);
  if(repFilters.categorie) data=data.filter(d=>d.categorie===repFilters.categorie);
  if(repFilters.ville) data=data.filter(d=>d.ville===repFilters.ville);
  return[...new Set(data.map(d=>d.domaine).filter(v=>v&&v!=='null'&&v.trim()))].sort((a,b)=>a.localeCompare(b));
}

function resetRepFilters(){
  repFilters={type:null,categorie:null,ville:null,domaine:null,search:''};
  const si=$('searchInput');if(si){si.value='';$('repSearchWrap').classList.remove('search-active');}
  updateRepFilterUI();renderRepertoire();
}

function updateRepFilterUI(){
  $('filterTypeBtn').classList.toggle('active',!!repFilters.type);
  $('filterCatBtn').classList.toggle('active',!!repFilters.categorie);
  $('filterVilleBtn').classList.toggle('active',!!repFilters.ville);
  $('filterDomaineBtn').classList.toggle('active',!!repFilters.domaine);
  const c=$('activeFilters');if(!c)return;
  let h='';
  if(repFilters.type) h+=`<div class="filter-tag"><i class="fas fa-tag"></i> ${repFilters.type==='fournisseurs'?'Fournisseurs':'Experts'} <button onclick="removeRepFilter('type')">✕</button></div>`;
  if(repFilters.categorie) h+=`<div class="filter-tag"><i class="fas fa-layer-group"></i> ${catNameMap[repFilters.categorie]} <button onclick="removeRepFilter('categorie')">✕</button></div>`;
  if(repFilters.ville) h+=`<div class="filter-tag"><i class="fas fa-map-marker-alt"></i> ${escHtml(repFilters.ville)} <button onclick="removeRepFilter('ville')">✕</button></div>`;
  if(repFilters.domaine) h+=`<div class="filter-tag"><i class="fas fa-folder"></i> ${escHtml(repFilters.domaine)} <button onclick="removeRepFilter('domaine')">✕</button></div>`;
  if(repFilters.search) h+=`<div class="filter-tag"><i class="fas fa-search"></i> "${escHtml(repFilters.search)}" <button onclick="removeRepFilter('search')">✕</button></div>`;
  c.innerHTML=h;
}

function removeRepFilter(k){
  if(k==='type')repFilters.type=null;
  else if(k==='categorie')repFilters.categorie=null;
  else if(k==='ville')repFilters.ville=null;
  else if(k==='domaine')repFilters.domaine=null;
  else if(k==='search'){repFilters.search='';const si=$('searchInput');if(si){si.value='';$('repSearchWrap').classList.remove('search-active');}}
  updateRepFilterUI();renderRepertoire();
}

function renderRepertoire(){
  const filtered=getFilteredRepertoire();
  const hasAny=Object.values(repFilters).some(v=>v&&v!='');
  const ri=$('resultInfo');
  if(hasAny){
    ri.innerHTML=`<i class="fas fa-filter"></i> ${filtered.length} résultat(s)`;
    ri.classList.add('visible');
  }else{ri.classList.remove('visible');}
  $('contactList').innerHTML=filtered.length
    ?filtered.map(i=>buildContactRow(i)).join('')
    :`<div class="empty-state"><div class="empty-icon"><i class="fas fa-user-slash"></i></div><div class="empty-title">Aucun résultat</div><div class="empty-sub">Modifiez vos filtres</div></div>`;
  updateRepFilterUI();
}

function buildContactRow(item){
  const color=getColor(item.name);
  const init=getInitials(item.name);
  let details=[];
  if(item.domaine) details.push(item.domaine);
  if(item.ville) details.push(item.ville);
  if(item.specialite && item.specialite!=='Général') details.push(item.specialite);
  let badges='';
  badges+=`<span class="badge ${item.type==='fournisseurs'?'badge-fourn':'badge-expert'}">${item.type==='fournisseurs'?'Fournisseur':'Expert'}</span>`;
  if(item.categorie&&catNameMap[item.categorie]) badges+=`<span class="badge ${catClassMap[item.categorie]}">${catNameMap[item.categorie]}</span>`;
  const enc=encodeURIComponent(JSON.stringify(item));
  return`<div class="contact-item" onclick="openDetailModal('${enc}')">
    <div class="contact-avatar" style="background:${color}">${init}</div>
    <div class="contact-info">
      <div class="contact-name">${escHtml(item.name)}</div>
      <div class="contact-details">${details.length?escHtml(details.join(' · ')):'Aucune info'}</div>
      <div class="contact-badges">${badges}</div>
    </div>
  </div>`;
}

// ==================== DETAIL MODAL ====================
function openDetailModal(enc){
  const item=JSON.parse(decodeURIComponent(enc));
  const color=getColor(item.name);
  $('modalAvatar').style.background=color;
  $('modalAvatar').textContent=getInitials(item.name);
  $('modalName').textContent=item.name;
  $('modalType').textContent=item.domaine||(item.type==='fournisseurs'?'Fournisseur':'Expert');
  let bh='';
  bh+=`<span class="badge ${item.type==='fournisseurs'?'badge-fourn':'badge-expert'}">${item.type==='fournisseurs'?'Fournisseur':'Expert'}</span>`;
  if(item.categorie&&catNameMap[item.categorie]) bh+=`<span class="badge ${catClassMap[item.categorie]}">${catNameMap[item.categorie]}</span>`;
  $('modalBadges').innerHTML=bh;
  const hp=item.phone&&item.phone!='null'&&item.phone.trim();
  const he=item.email&&item.email!='null'&&item.email.trim();
  const hw=item.web&&item.web!='null'&&item.web.startsWith('http');
  const rows=[
    item.domaine&&{icon:'fa-folder',label:'Domaine',value:item.domaine},
    item.specialite&&item.specialite!='Général'&&{icon:'fa-cog',label:'Spécialité',value:item.specialite},
    item.ville&&{icon:'fa-map-marker-alt',label:'Ville',value:item.ville},
    hp&&{icon:'fa-phone-alt',label:'Téléphone',value:item.phone},
    he&&{icon:'fa-envelope',label:'Email',value:item.email},
    hw&&{icon:'fa-globe',label:'Site Web',value:item.web},
  ].filter(Boolean);
  $('modalBody').innerHTML=rows.map(r=>`<div class="modal-row"><div class="modal-icon"><i class="fas ${r.icon}"></i></div><div><div class="modal-row-label">${r.label}</div><div class="modal-row-value">${escHtml(r.value)}</div></div></div>`).join('');
  let ah='';
  if(hp){
    ah+=`<button class="modal-btn" onclick="window.location.href='tel:${item.phone}'"><i class="fas fa-phone-alt"></i><span>Appeler</span></button>`;
    let wa=item.phone.replace(/[^0-9+]/g,'');
    if(wa.startsWith('0')) wa='212'+wa.substring(1);
    if(wa.startsWith('+')) wa=wa.substring(1);
    ah+=`<button class="modal-btn whatsapp" onclick="window.open('https://wa.me/${wa}','_blank')"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></button>`;
  }
  if(he) ah+=`<button class="modal-btn" onclick="window.location.href='mailto:${item.email}'"><i class="fas fa-envelope"></i><span>Email</span></button>`;
  if(hw) ah+=`<button class="modal-btn" onclick="window.open('${item.web}','_blank')"><i class="fas fa-globe"></i><span>Site Web</span></button>`;
  if(hp) ah+=`<button class="modal-btn" onclick="saveVCF('${escHtml(item.name)}','${item.phone}','${item.email||''}','${item.web||''}')"><i class="fas fa-save"></i><span>Contact</span></button>`;
  if(isAdmin&&item.id){
    ah+=`<div style="display:flex;gap:10px;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--whatsapp-border);width:100%;justify-content:center">
      <button class="modal-btn" onclick="closeDetailModal();openEditModal('${item.id}')"><i class="fas fa-pen"></i><span>Modifier</span></button>
      <button class="modal-btn" onclick="closeDetailModal();openDeleteModal('${item.id}')"><i class="fas fa-trash-alt"></i><span>Supprimer</span></button>
    </div>`;
  }
  $('modalActions').innerHTML=ah;
  $('detailModal').classList.add('show');
}
function closeDetailModal(){$('detailModal').classList.remove('show');}
function saveVCF(n,p,e,w){
  const d=`BEGIN:VCARD\nVERSION:3.0\nFN:${n}\nTEL:${p}\n${e?'EMAIL:'+e+'\n':''}${w?'URL:'+w+'\n':''}END:VCARD`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([d],{type:'text/vcard'}));
  a.download=`${n.replace(/[^a-z0-9]/gi,'_')}.vcf`;document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('📇 Contact sauvegardé');
}

// ==================== FILTER MODALS ====================
let _listSelectFn=null;

}

function showVilleFilter(){const v=getRepVilles();if(!v.length){toast('⚠️ Aucune ville');return;}showList('Villes',v,val=>{repFilters.ville=val;renderRepertoire();});}
function showDomaineFilter(){const d=getRepDomaines();if(!d.length){toast('⚠️ Aucun domaine');return;}showList('Domaines',d,val=>{repFilters.domaine=val;renderRepertoire();});}

// ==================== EXPLORER ====================
function renderExplorer(){
  const bc=$('explorerBreadcrumb');
  let bch=`<div class="bc" onclick="goExplorerLevel(0)"><i class="fas fa-home"></i> Accueil</div>`;
  explorerStack.forEach((item,idx)=>{
    let label='';
    if(item.type) label=item.type==='fournisseurs'?'Fournisseurs':'Experts';
    else if(item.domaine) label=item.domaine;
    else if(item.specialite) label=item.specialite;
    bch+=`<span class="bc-sep">›</span><div class="bc" onclick="goExplorerLevel(${idx+1})">${escHtml(label)}</div>`;
  });
  bc.innerHTML=bch;
  const c=$('explorerContent');
  if(explorerStack.length===0){
    c.innerHTML=`<div class="explorer-item" onclick="explorerNavigateTo('type','fournisseurs')"><div class="explorer-icon"><i class="fas fa-industry"></i></div><div><div class="explorer-name">Fournisseurs</div><div class="explorer-count">${dbData.filter(d=>d.type==='fournisseurs').length} professionnels</div></div><i class="fas fa-chevron-right explorer-arrow"></i></div><div class="explorer-item" onclick="explorerNavigateTo('type','experts')"><div class="explorer-icon" style="background:rgba(43,150,209,0.12);color:#2b96d1"><i class="fas fa-microchip"></i></div><div><div class="explorer-name">Experts</div><div class="explorer-count">${dbData.filter(d=>d.type==='experts').length} professionnels</div></div><i class="fas fa-chevron-right explorer-arrow"></i></div>`;
  }else if(explorerStack.length===1){
    const type=explorerStack[0].type;
    const domaines={};
    dbData.filter(d=>d.type===type).forEach(i=>{const d=i.domaine||'Autre';domaines[d]=(domaines[d]||0)+1;});
    c.innerHTML=Object.entries(domaines).sort().map(([d,cnt])=>`<div class="explorer-item" onclick="explorerNavigateTo('domaine','${escHtml(d)}')"><div class="explorer-icon"><i class="fas fa-folder"></i></div><div><div class="explorer-name">${escHtml(d)}</div><div class="explorer-count">${cnt} professionnels</div></div><i class="fas fa-chevron-right explorer-arrow"></i></div>`).join('');
  }else if(explorerStack.length===2){
    const type=explorerStack[0].type,domaine=explorerStack[1].domaine;
    const specs={};
    dbData.filter(d=>d.type===type&&(d.domaine||'Autre')===domaine).forEach(i=>{const s=i.specialite||'Général';specs[s]=(specs[s]||0)+1;});
    c.innerHTML=Object.entries(specs).sort().map(([s,cnt])=>`<div class="explorer-item" onclick="explorerNavigateTo('specialite','${escHtml(s)}')"><div class="explorer-icon" style="background:rgba(255,159,74,0.12);color:#ff9f4a"><i class="fas fa-cog"></i></div><div><div class="explorer-name">${escHtml(s)}</div><div class="explorer-count">${cnt} spécialistes</div></div><i class="fas fa-chevron-right explorer-arrow"></i></div>`).join('');
  }else{
    const type=explorerStack[0].type,domaine=explorerStack[1].domaine,specialite=explorerStack[2].specialite;
    const items=dbData.filter(d=>d.type===type&&(d.domaine||'Autre')===domaine&&(d.specialite||'Général')===specialite);
    c.innerHTML=items.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(i=>buildContactRow(i)).join('');
  }
}
function goExplorerLevel(l){explorerStack=explorerStack.slice(0,l);renderExplorer();}
function explorerNavigateTo(t,v){
  if(t==='type')explorerStack=[{type:v}];
  else if(t==='domaine')explorerStack.push({domaine:v});
  else if(t==='specialite')explorerStack.push({specialite:v});
  renderExplorer();
}

// ==================== STATS & CRUD ====================
function updateStats(){
  $('statFour').textContent=dbData.filter(d=>d.type==='fournisseurs').length;
  $('statExp').textContent=dbData.filter(d=>d.type==='experts').length;
  $('statVilles').textContent=new Set(dbData.map(d=>d.ville).filter(v=>v&&v!='null'&&v.trim())).size;
  $('statDomaines').textContent=new Set(dbData.map(d=>d.domaine).filter(d=>d&&d!='null'&&d.trim())).size;
  $('statServices').textContent=dbData.filter(d=>d.categorie==='services').length;
  $('statProduits').textContent=dbData.filter(d=>d.categorie==='products').length;
  $('statMaqola').textContent=dbData.filter(d=>d.categorie==='maqola').length;
  $('statYadAmila').textContent=dbData.filter(d=>d.categorie==='yad-amila').length;
  $('headerSub').textContent=`${dbData.length} professionnels · ${new Set(dbData.map(d=>d.domaine).filter(Boolean)).size} domaines`;
}

function openAddModal(){
  if(!isAdmin){toast('⚠️ Accès réservé admin');return;}
  $('editTitle').innerHTML='<i class="fas fa-plus-circle"></i> Ajouter';
  ['editId','editName','editDomaine','editSpecialite','editVille','editPhone','editEmail','editWeb'].forEach(id=>$(id).value='');
  $('editType').value='fournisseurs';$('editCat').value='services';
  $('editModal').classList.add('show');
}
function openEditModal(id){
  if(!isAdmin){toast('⚠️ Accès réservé admin');return;}
  const item=dbData.find(i=>i.id===id);if(!item)return;
  $('editTitle').innerHTML='<i class="fas fa-pen"></i> Modifier';
  $('editId').value=item.id;$('editName').value=item.name;
  $('editType').value=item.type;$('editCat').value=item.categorie;
  $('editDomaine').value=item.domaine||'';$('editSpecialite').value=item.specialite||'';
  $('editVille').value=item.ville||'';$('editPhone').value=item.phone||'';
  $('editEmail').value=item.email||'';$('editWeb').value=item.web||'';
  $('editModal').classList.add('show');
}
async function saveItem(){
  if(!isAdmin){toast('⚠️ Accès réservé admin');return;}
  const id=$('editId').value;
  const itemData={
    id:id||`${Date.now()}_${Math.random().toString(36).slice(2)}`,
    name:$('editName').value.trim(),type:$('editType').value,
    categorie:$('editCat').value,domaine:$('editDomaine').value||'Autre',
    specialite:$('editSpecialite').value||'Général',
    ville:$('editVille').value||'',phone:formatPhone($('editPhone').value),
    email:$('editEmail').value||'',web:$('editWeb').value||''
  };
  if(!itemData.name){toast('⚠️ Nom requis');return;}
  showLoading(true);
  try{
    const oldItem=id?dbData.find(i=>i.id===id):null;
    if(oldItem&&(oldItem.type!==itemData.type||oldItem.categorie!==itemData.categorie)){
      const op=`professionals/${typeMap[oldItem.type]}/${categoryMap[oldItem.categorie]}`;
      const os=await dbRef.ref(op).once('value');
      await dbRef.ref(op).set((os.val()||[]).filter(i=>i.id!==id));
    }
    const path=`professionals/${typeMap[itemData.type]}/${categoryMap[itemData.categorie]}`;
    const snap=await dbRef.ref(path).once('value');
    let arr=snap.val()||[];
    const idx=arr.findIndex(i=>i.id===id);
    if(idx!==-1)arr[idx]=itemData;else arr.push(itemData);
    await dbRef.ref(path).set(arr);
    toast(id?'✅ Modifié':'✅ Ajouté');
    closeModal('editModal');
    await loadDB();
    resetRepFilters();
  }catch(e){toast('❌ Erreur: '+e.message);}
  showLoading(false);
}
function openDeleteModal(id){
  if(!isAdmin){toast('⚠️ Accès réservé admin');return;}
  const item=dbData.find(i=>i.id===id);if(!item)return;
  pendingDelete=item;
  $('deleteMsg').innerHTML=`Supprimer <strong>${escHtml(item.name)}</strong> ?`;
  $('deleteModal').classList.add('show');
}
async function confirmDeleteItem(){
  if(!isAdmin||!pendingDelete)return;
  showLoading(true);
  try{
    const path=`professionals/${typeMap[pendingDelete.type]}/${categoryMap[pendingDelete.categorie]}`;
    const snap=await dbRef.ref(path).once('value');
    await dbRef.ref(path).set((snap.val()||[]).filter(i=>i.id!==pendingDelete.id));
    toast('🗑️ Supprimé');closeModal('deleteModal');pendingDelete=null;
    await loadDB();resetRepFilters();
  }catch(e){toast('❌ Erreur');}
  showLoading(false);
}

async function syncToFirebase(){
  if(!isAdmin){toast('⚠️ Accès réservé admin');return;}
  if(!confirm('Synchroniser les CSV ?'))return;
  showLoading(true);
  try{
    const structure={"FOURNISSEURS":{"SERVICES":[],"PRODUITS":[],"MAQAOLA":[],"YAD AMILA":[]},"EXPERTS":{"SERVICES":[],"PRODUITS":[],"MAQAOLA":[],"YAD AMILA":[]}};
    csvFournisseurs.forEach((s,i)=>{structure["FOURNISSEURS"]["SERVICES"].push({id:`four_${Date.now()}_${i}`,...s});});
    csvExperts.forEach((e,i)=>{structure["EXPERTS"]["YAD AMILA"].push({id:`exp_${Date.now()}_${i}`,...e});});
    await dbRef.ref('professionals').set(structure);
    toast('✅ Synchronisation réussie');await loadDB();
  }catch(e){toast('❌ Erreur: '+e.message);}
  showLoading(false);
}

async function loadCSV(url){
  try{
    const res=await fetch(url);const text=await res.text();
    const lines=text.split(/\r?\n/);const data=[];
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(',');
      if(cols[1]){
        data.push({
          name:cols[1]?.replace(/["']/g,'').trim()||'',
          domaine:cols[2]?.replace(/["']/g,'').trim()||'Autre',
          specialite:cols[3]?.replace(/["']/g,'').trim()||'Général',
          ville:cols[4]?.replace(/["']/g,'').trim()||'',
          phone:formatPhone(cols[5]?.replace(/["']/g,'').trim()),
          email:cols[6]?.replace(/["']/g,'').trim()||'',
          web:cols[7]?.replace(/["']/g,'').trim()||''
        });
      }
    }
    return data;
  }catch(e){return[];}
}

async function loadDB(){
  try{
    const snap=await dbRef.ref('professionals').once('value');
    const data=snap.val();dbData=[];
    if(data){
      for(const[ft,to]of Object.entries(data)){
        const type=ft==='FOURNISSEURS'?'fournisseurs':'experts';
        for(const[fc,items]of Object.entries(to)){
          let cat=null;
          if(fc==='SERVICES')cat='services';
          else if(fc==='PRODUITS')cat='products';
          else if(fc==='MAQAOLA')cat='maqola';
          else if(fc==='YAD AMILA')cat='yad-amila';
          if(!cat||!Array.isArray(items))continue;
          for(const item of items){
            if(item?.name)dbData.push({...item,type,categorie:cat,id:item.id||`${type}_${Date.now()}_${Math.random()}`});
          }
        }
      }
    }
    dbData.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    updateStats();renderCurrent();
  }catch(e){toast('❌ Erreur chargement');}
}

// ==================== NAVIGATION ====================
function showSection(id,reset=true){
  if(reset){
    if(id!=='explorer')explorerStack=[];
    if(id!=='repertoire')resetRepFilters();
  }
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  $(id+'Section').classList.add('active');
  document.querySelectorAll('.nav-item[data-sec]').forEach(b=>b.classList.remove('active'));
  const tb=document.querySelector(`.nav-item[data-sec="${id}"]`);
  if(tb)tb.classList.add('active');
  currentSection=id;
  if(id==='repertoire')renderRepertoire();
  else if(id==='explorer')renderExplorer();
  window.scrollTo({top:0,behavior:'smooth'});
}
function handleSectionClick(id){
  if(currentSection===id){
    if(window.scrollY>10)window.scrollTo({top:0,behavior:'smooth'});
    else if(id==='repertoire'){resetRepFilters();toast('🔍 Filtres réinitialisés');}
    else if(id==='explorer'){explorerStack=[];renderExplorer();toast('↺ Explorer réinitialisé');}
  }else showSection(id,true);
}
function renderCurrent(){
  if(currentSection==='repertoire')renderRepertoire();
  else if(currentSection==='explorer')renderExplorer();
}
