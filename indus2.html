<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#17212b">
<title>Connect Industry | Plateforme Industrielle Maroc</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg-page:#17212b;
  --bg-panel:#1f2a33;
  --bg-header:#17212b;
  --bg-hover:#2b353d;
  --bg-input:#1f2a33;
  --bg-search:#1f2a33;
  --bg-highlight:#2b353d;
  --blue:#2b96d1;
  --blue-dim:rgba(43,150,209,0.12);
  --green:#77b255;
  --green-dim:rgba(119,178,85,0.12);
  --orange:#ff9f4a;
  --orange-dim:rgba(255,159,74,0.12);
  --red:#e53935;
  --red-dim:rgba(229,57,53,0.12);
  --purple:#a77dcb;
  --purple-dim:rgba(167,125,203,0.12);
  --whatsapp:#25D366;
  --whatsapp-dim:rgba(37,211,102,0.12);
  --text:#e1e3e6;
  --text2:#7e8792;
  --text3:#4b5563;
  --border:#2b353d;
  --divider:#2b353d;
  --nav-h:56px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --shadow-sm:0 1px 2px rgba(0,0,0,0.2);
  --shadow-md:0 2px 8px rgba(0,0,0,0.3);
  --radius-sm:8px;
  --radius-md:12px;
  --radius-lg:16px;
}
body.light{
  --bg-page:#eef2f5;
  --bg-panel:#ffffff;
  --bg-header:#ffffff;
  --bg-hover:#f0f2f5;
  --bg-input:#f0f2f5;
  --bg-search:#f0f2f5;
  --bg-highlight:#e8eef2;
  --text:#1a1e21;
  --text2:#656d76;
  --text3:#9aa2a8;
  --border:#e0e4e8;
  --divider:#e0e4e8;
}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg-page);
  color:var(--text);
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--text3);border-radius:99px;}

.app-header{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);
  background:var(--bg-header);
  display:flex;align-items:center;
  padding:0 12px;z-index:400;gap:10px;
  border-bottom:0.5px solid var(--border);
}
.header-avatar{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--green));
  display:flex;align-items:center;justify-content:center;
  font-weight:600;color:#fff;font-size:0.8rem;
}
.header-info{flex:1;min-width:0;}
.header-name{font-weight:600;color:var(--text);font-size:0.85rem;}
.header-sub{font-size:0.6rem;color:var(--text2);margin-top:2px;}
.header-actions{display:flex;align-items:center;gap:2px;}
.hbtn{
  width:34px;height:34px;border-radius:50%;
  background:transparent;border:none;cursor:pointer;
  color:var(--text2);display:flex;align-items:center;
  justify-content:center;font-size:0.9rem;transition:.15s;
}
.hbtn:hover{background:var(--bg-hover);color:var(--blue);}
.hbtn.admin-on{color:var(--orange);}
#appTime{font-size:0.6rem;color:var(--text2);padding:0 4px;}

.bottom-tabs{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(52px + var(--safe-bottom));
  background:var(--bg-panel);
  border-top:0.5px solid var(--border);
  display:flex;
  z-index:400;
  padding-bottom:var(--safe-bottom);
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;background:transparent;border:none;
  cursor:pointer;color:var(--text2);transition:.15s;height:52px;
  position:relative;font-size:0.55rem;
}
.tab-btn i{font-size:1rem;margin-bottom:2px;}
.tab-btn.active{color:var(--blue);}
.tab-admin{display:none;}
body.admin-mode .tab-admin{display:flex;}

.main{padding-top:var(--nav-h);padding-bottom:calc(52px + var(--safe-bottom));min-height:100dvh;}
.section{display:none;padding:0 12px;}
.section.active{display:block;}

.home-banner{
  background:linear-gradient(135deg,var(--blue) 0%,var(--green) 100%);
  margin:-12px -12px 16px -12px;
  padding:28px 20px 32px;
  position:relative;overflow:hidden;
}
.home-banner::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 30% 20%, rgba(255,255,255,0.08) 0%, transparent 60%);
}
.home-title{font-size:1.3rem;font-weight:700;color:#fff;position:relative;letter-spacing:-0.5px;}
.home-title span{opacity:0.9;}
.home-subtitle{font-size:0.62rem;color:rgba(255,255,255,0.7);margin-top:6px;position:relative;}
.stats-section{padding:4px 0;}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px;}
.stat-card{
  background:var(--bg-panel);border-radius:var(--radius-md);
  padding:10px 12px;
  display:flex;align-items:center;gap:10px;
  border:0.5px solid var(--border);
  transition:.2s;cursor:pointer;
}
.stat-card:hover{border-color:var(--blue);background:var(--bg-hover);transform:translateY(-1px);}
.stat-card:active{transform:scale(0.98);}
.stat-card-icon{
  width:36px;height:36px;border-radius:var(--radius-sm);
  background:var(--blue-dim);display:flex;align-items:center;
  justify-content:center;color:var(--blue);font-size:0.9rem;flex-shrink:0;
}
.stat-num{font-size:1.2rem;font-weight:700;color:var(--text);line-height:1;}
.stat-lbl{font-size:0.52rem;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;margin-top:2px;}

.search-wrap{
  background:var(--bg-panel);padding:8px 0;
  position:sticky;top:var(--nav-h);
  border-bottom:0.5px solid var(--border);z-index:100;
}
.search-inner{
  display:flex;align-items:center;gap:8px;
  background:var(--bg-search);border-radius:var(--radius-lg);
  padding:8px 14px;
}
.search-inner i{color:var(--text2);font-size:0.75rem;}
.search-inner input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:0.75rem;font-family:inherit;}
.search-inner input::placeholder{color:var(--text2);}
.search-clear{
  width:18px;height:18px;border-radius:50%;
  background:var(--text2);border:none;cursor:pointer;
  color:var(--bg-primary);display:none;align-items:center;
  justify-content:center;font-size:0.5rem;
}
.search-active .search-clear{display:flex;}

.filter-row{
  display:flex;gap:6px;padding:8px 0;
  overflow-x:auto;background:var(--bg-panel);
  border-bottom:0.5px solid var(--border);
}
.filter-row::-webkit-scrollbar{display:none;}
.fchip{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--bg-search);border:0.5px solid var(--border);
  border-radius:30px;padding:4px 12px;cursor:pointer;
  color:var(--text2);font-size:0.6rem;font-weight:500;
  white-space:nowrap;transition:.15s;flex-shrink:0;
}
.fchip i{font-size:0.6rem;}
.fchip:hover{border-color:var(--blue);color:var(--blue);}
.fchip.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.fchip.reset:hover{border-color:var(--red);color:var(--red);}

.active-filters{display:flex;gap:5px;flex-wrap:wrap;padding:6px 0;background:var(--bg-panel);}
.active-filter-tag{
  background:var(--blue-dim);padding:2px 8px;border-radius:30px;
  font-size:0.55rem;color:var(--blue);
  display:inline-flex;align-items:center;gap:4px;
}
.active-filter-tag button{background:none;border:none;cursor:pointer;color:var(--blue);font-size:0.6rem;}

.result-bar{
  background:var(--bg-search);padding:6px 12px;font-size:0.6rem;
  color:var(--text2);display:none;align-items:center;gap:6px;
  border-bottom:0.5px solid var(--border);
}
.result-bar i{color:var(--blue);}
.result-bar.visible{display:flex;}

.contact-row{
  background:var(--bg-panel);display:flex;align-items:center;
  padding:8px 0;border-bottom:0.5px solid var(--border);
  cursor:pointer;gap:10px;transition:.12s;
}
.contact-row:hover{background:var(--bg-hover);}
.contact-row:active{background:var(--bg-highlight);transform:scale(0.99);}
.contact-avatar{
  width:44px;height:44px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;
  font-weight:600;font-size:0.85rem;color:#fff;flex-shrink:0;
}
.contact-info{flex:1;min-width:0;}
.contact-name{font-weight:500;font-size:0.8rem;color:var(--text);}
.contact-meta{font-size:0.6rem;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.contact-right{text-align:right;flex-shrink:0;}
.contact-badges{display:flex;gap:4px;margin-top:2px;justify-content:flex-end;flex-wrap:wrap;}
.cbadge{font-size:0.4rem;padding:1px 6px;border-radius:30px;font-weight:500;letter-spacing:.2px;}
.cb-green{background:var(--green-dim);color:var(--green);}
.cb-blue{background:var(--blue-dim);color:var(--blue);}
.cb-orange{background:var(--orange-dim);color:var(--orange);}
.cb-purple{background:var(--purple-dim);color:var(--purple);}
.cb-red{background:var(--red-dim);color:var(--red);}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:800;
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transition:.2s;padding:16px;
}
.modal-overlay.show{opacity:1;visibility:visible;}
.modal-detail{
  background:var(--bg-panel);width:100%;max-width:340px;
  border-radius:var(--radius-lg);overflow:hidden;
  animation:modalPop .2s ease;max-height:85vh;overflow-y:auto;
}
@keyframes modalPop{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-header{background:var(--bg-header);padding:18px 16px 14px;text-align:center;position:relative;}
.modal-close{
  position:absolute;top:10px;right:10px;width:28px;height:28px;
  border-radius:50%;background:var(--bg-hover);border:none;
  cursor:pointer;color:var(--text2);font-size:0.7rem;
  display:flex;align-items:center;justify-content:center;
}
.modal-avatar{
  width:60px;height:60px;border-radius:50%;margin:0 auto 8px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;font-weight:600;color:#fff;
}
.modal-name{font-size:1rem;font-weight:600;color:var(--text);}
.modal-type{font-size:0.6rem;color:var(--text2);margin-top:2px;}
.modal-badges{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap;}
.modal-body{padding:12px 14px;}
.modal-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--divider);}
.modal-row:last-child{border-bottom:none;}
.modal-icon{width:28px;color:var(--blue);font-size:0.8rem;text-align:center;}
.modal-row-label{font-size:0.5rem;color:var(--text2);text-transform:uppercase;margin-bottom:1px;}
.modal-row-value{font-size:0.7rem;color:var(--text);word-break:break-word;}
.modal-actions{
  display:flex;justify-content:center;gap:10px;
  padding:10px 14px 14px;border-top:0.5px solid var(--divider);flex-wrap:wrap;
}
.modal-action-btn{
  min-width:48px;padding:6px 8px;border-radius:30px;
  background:var(--bg-search);border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;transition:.2s;color:var(--text2);
}
.modal-action-btn i{font-size:0.9rem;}
.modal-action-btn span{font-size:0.48rem;font-weight:500;}
.modal-action-btn:hover{transform:scale(0.96);background:var(--bg-hover);}
.modal-action-btn.save:hover{color:var(--green);}
.modal-action-btn.whatsapp{color:var(--whatsapp);}
.modal-action-btn.whatsapp:hover{background:var(--whatsapp-dim);}

.breadcrumb{
  background:var(--bg-panel);padding:8px 0;
  display:flex;gap:6px;flex-wrap:wrap;border-bottom:0.5px solid var(--border);
}
.bc{font-size:0.65rem;font-weight:500;color:var(--text2);cursor:pointer;}
.bc:hover,.bc.active{color:var(--blue);}
.bc-sep{color:var(--text3);}
.exp-row{
  display:flex;align-items:center;padding:10px 0;
  background:var(--bg-panel);border-bottom:0.5px solid var(--border);
  cursor:pointer;gap:10px;transition:.12s;
}
.exp-row:hover{background:var(--bg-hover);}
.exp-icon{
  width:40px;height:40px;border-radius:50%;background:var(--blue-dim);
  display:flex;align-items:center;justify-content:center;
  color:var(--blue);font-size:0.9rem;flex-shrink:0;
}
.exp-name{font-weight:500;color:var(--text);font-size:0.8rem;}
.exp-count{font-size:0.55rem;color:var(--text2);margin-top:2px;}
.exp-arrow{color:var(--text3);margin-left:auto;font-size:0.7rem;}

.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:700;
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transition:.2s;
}
.overlay.show{opacity:1;visibility:visible;}
.sheet{
  background:var(--bg-panel);width:100%;max-width:340px;
  border-radius:var(--radius-lg);max-height:85vh;overflow-y:auto;
}
.sheet-head{
  padding:12px 14px;border-bottom:0.5px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:var(--bg-panel);z-index:1;
}
.sheet-head h3{font-size:0.8rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px;}
.sheet-head h3 i{color:var(--blue);font-size:0.9rem;}
.sheet-close{
  width:28px;height:28px;border-radius:50%;
  background:var(--bg-search);border:none;cursor:pointer;color:var(--text2);
  display:flex;align-items:center;justify-content:center;font-size:0.7rem;
}
.sheet-body{padding:12px;}
.sheet-foot{padding:10px 12px;border-top:0.5px solid var(--border);display:flex;gap:8px;}
.fgroup{margin-bottom:10px;}
.fgroup label{font-size:0.55rem;font-weight:600;color:var(--text2);margin-bottom:3px;display:block;text-transform:uppercase;letter-spacing:.3px;}
.field{
  width:100%;background:var(--bg-search);border:0.5px solid var(--border);
  border-radius:var(--radius-sm);padding:8px 12px;color:var(--text);
  font-size:0.7rem;outline:none;font-family:inherit;
}
.field:focus{border-color:var(--blue);}
select.field{padding:8px 10px;}
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:7px 14px;
  border-radius:30px;cursor:pointer;font-weight:500;border:none;
  transition:.15s;font-size:0.7rem;font-family:inherit;
}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:#3a9fd8;}
.btn-ghost{background:var(--bg-search);color:var(--text2);}
.btn-danger{background:var(--red-dim);color:var(--red);}
.btn-full{width:100%;justify-content:center;}
.menu-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  cursor:pointer;border-bottom:0.5px solid var(--divider);transition:.12s;
}
.menu-item:hover{background:var(--bg-hover);}
.menu-icon{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:0.75rem;
}
.menu-label{font-size:0.75rem;color:var(--text);}

.toast{
  position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.85);color:#fff;border-radius:30px;
  padding:6px 14px;font-size:0.7rem;z-index:9000;
  opacity:0;visibility:hidden;transition:.25s;white-space:nowrap;
  backdrop-filter:blur(10px);
}
.toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(-4px);}
.loading-screen{
  position:fixed;inset:0;background:var(--bg-page);z-index:9999;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;transition:.4s;
}
.loading-screen.hide{opacity:0;pointer-events:none;}
.loading-logo{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--green));
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;font-weight:700;color:#fff;
}
.loading-bar{width:110px;height:2px;background:var(--bg-input);border-radius:99px;overflow:hidden;}
.loading-fill{width:40%;height:100%;background:var(--blue);animation:load .9s ease infinite;}
@keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(250%)}}
.admin-only{display:none!important;}
body.admin-mode .admin-only{display:flex!important;}
.empty-state{text-align:center;padding:48px 20px;color:var(--text2);}
.empty-icon{font-size:2.2rem;margin-bottom:8px;opacity:.4;}
.empty-title{font-size:0.8rem;font-weight:500;}
.empty-sub{font-size:0.65rem;margin-top:3px;opacity:.7;}

/* Explorer deep navigation */
.explorer-level-indent{margin-left:12px;}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-avatar" id="headerAvatar">CI</div>
  <div class="header-info">
    <div class="header-name">Connect Industry</div>
    <div class="header-sub" id="headerSub">Plateforme Industrielle</div>
  </div>
  <div class="header-actions">
    <span id="appTime"></span>
    <button class="hbtn" id="themeBtn"><i class="fas fa-moon"></i></button>
    <button class="hbtn" id="adminBtn"><i class="fas fa-user-shield"></i></button>
    <button class="hbtn admin-only" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
  </div>
</header>

<nav class="bottom-tabs">
  <button class="tab-btn active" data-sec="home"><i class="fas fa-home"></i><span>Accueil</span></button>
  <button class="tab-btn" data-sec="explorer"><i class="fas fa-compass"></i><span>Explorer</span></button>
  <button class="tab-btn" data-sec="repertoire"><i class="fas fa-users"></i><span>Répertoire</span></button>
  <button class="tab-btn tab-admin admin-only" id="syncBtn"><i class="fas fa-cloud-upload-alt"></i><span>Sync</span></button>
  <button class="tab-btn" id="addBtn"><i class="fas fa-plus-circle"></i><span>Ajouter</span></button>
</nav>

<main class="main">

  <div id="homeSection" class="section active">
    <div class="home-banner">
      <div class="home-title">CONNECT <span>INDUSTRY</span></div>
      <div class="home-subtitle">Mise en relation entre professionnels de l'industrie au Maroc</div>
    </div>
    <div class="stats-section">
      <div class="stats-grid">
        <div class="stat-card" onclick="filterByTypeFromStats('fournisseurs')">
          <div class="stat-card-icon"><i class="fas fa-industry"></i></div>
          <div><div class="stat-num" id="statFour">0</div><div class="stat-lbl">Fournisseurs</div></div>
        </div>
        <div class="stat-card" onclick="filterByTypeFromStats('experts')">
          <div class="stat-card-icon" style="background:var(--blue-dim);color:var(--blue)"><i class="fas fa-microchip"></i></div>
          <div><div class="stat-num" id="statExp">0</div><div class="stat-lbl">Experts</div></div>
        </div>
        <div class="stat-card" onclick="filterByVilleFromStats()">
          <div class="stat-card-icon" style="background:var(--orange-dim);color:var(--orange)"><i class="fas fa-map-marker-alt"></i></div>
          <div><div class="stat-num" id="statVilles">0</div><div class="stat-lbl">Villes</div></div>
        </div>
        <div class="stat-card" onclick="filterByDomaineFromStats()">
          <div class="stat-card-icon" style="background:var(--purple-dim);color:var(--purple)"><i class="fas fa-layer-group"></i></div>
          <div><div class="stat-num" id="statDomaines">0</div><div class="stat-lbl">Domaines</div></div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card" onclick="filterByCategorieFromStats('services')">
          <div class="stat-card-icon"><i class="fas fa-cogs"></i></div>
          <div><div class="stat-num" id="statServices">0</div><div class="stat-lbl">Services</div></div>
        </div>
        <div class="stat-card" onclick="filterByCategorieFromStats('products')">
          <div class="stat-card-icon" style="background:var(--green-dim);color:var(--green)"><i class="fas fa-boxes"></i></div>
          <div><div class="stat-num" id="statProduits">0</div><div class="stat-lbl">Produits</div></div>
        </div>
        <div class="stat-card" onclick="filterByCategorieFromStats('maqola')">
          <div class="stat-card-icon" style="background:var(--orange-dim);color:var(--orange)"><i class="fas fa-hard-hat"></i></div>

<script>
// ==================== CONFIG ====================
const CSV_EXPERTS="https://docs.google.com/spreadsheets/d/e/2PACX-1vSjj2c3fjfHowy8yxOfpVAsfXLRVgSQPJQ7PVc4wvI2dI7g0hQwF32QoByKExzadiHivu3oKYRpgWKK/pub?gid=42570462&single=true&output=csv";
const CSV_FOURNISSEURS="https://docs.google.com/spreadsheets/d/e/2PACX-1vT9oFi63lhgtX8h-DstURguy8B5Vv6GmzTqDWIWSEVXDcicvyeZd7iyVX8gZ2ldtMC8YRRVsUOzG92G/pub?gid=587124901&single=true&output=csv";
const ADMIN_PASSWORD="admin123";

const firebaseConfig={
  apiKey:"AIzaSyBQKPqut41Jqs28Zn_z-I_ffD-iNCnFpdU",
  authDomain:"said-rahil-default-rtdb.firebaseio.com",
  databaseURL:"https://said-rahil-default-rtdb.firebaseio.com/",
  projectId:"said-rahil",
  storageBucket:"said-rahil.firebasestorage.app"
};
firebase.initializeApp(firebaseConfig);
const dbRef=firebase.database();

// ==================== STATE ====================
let csvExperts=[],csvFournisseurs=[],dbData=[];
let isAdmin=false,currentSection='home';
let explorerStack=[]; // Stack for deep navigation: [{type, domaine, specialite?}]
let pendingDelete=null;
let repFilters={type:null,categorie:null,ville:null,domaine:null,search:''};

// ==================== HELPERS ====================
function $(id){return document.getElementById(id);}
function toast(msg){const t=$('toast');t.innerHTML=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function closeModal(id){$(id).classList.remove('show');}
function showLoading(v){v?$('loadingScreen').classList.remove('hide'):$('loadingScreen').classList.add('hide');}
function escHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function formatPhone(p){if(!p)return'';let c=String(p).replace(/[\s\-\(\)\.]/g,'');if(c.startsWith('00'))c='+'+c.slice(2);else if(c.startsWith('0'))c='+212'+c.slice(1);return c;}
function getInitials(name){const parts=(name||'').trim().split(/\s+/);return parts.slice(0,2).map(p=>p[0]||'').join('').toUpperCase()||'?';}
const COLORS=['#2b96d1','#77b255','#ff9f4a','#a77dcb','#e53935','#26a69a','#42a5f5','#ec407a','#ab47bc','#ef6c00'];
function getColor(name){let h=0;for(const c of name||'')h=(h*31+c.charCodeAt(0))&0xffff;return COLORS[h%COLORS.length];}
const catNameMap={services:'Services',products:'Produits',maqola:'Maqaola','yad-amila':'Yad Amila'};
const catColorMap={services:'cb-green',products:'cb-green',maqola:'cb-orange','yad-amila':'cb-purple'};
const typeMap={'fournisseurs':'FOURNISSEURS','experts':'EXPERTS'};
const categoryMap={'services':'SERVICES','products':'PRODUITS','maqola':'MAQAOLA','yad-amila':'YAD AMILA'};

function normalizeStr(s){
  return String(s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .trim();
}

function fieldMatches(value,q){
  if(!value||!q)return false;
  return normalizeStr(String(value)).includes(normalizeStr(q));
}

// ==================== FILTRAGE PAR STATS ====================
function filterByTypeFromStats(type) {
  resetRepFilters();
  if(type === 'fournisseurs') {
    repFilters.type = 'fournisseurs';
    toast(`🔍 ${$('statFour').innerText} Fournisseurs`);
  } else if(type === 'experts') {
    repFilters.type = 'experts';
    toast(`🔍 ${$('statExp').innerText} Experts`);
  }
  showSection('repertoire', true);
  renderRepertoire();
}

function filterByCategorieFromStats(categorie) {
  resetRepFilters();
  let categorieKey = '';
  let categorieName = '';
  switch(categorie) {
    case 'services': categorieKey = 'services'; categorieName = 'Services'; break;
    case 'products': categorieKey = 'products'; categorieName = 'Produits'; break;
    case 'maqola': categorieKey = 'maqola'; categorieName = 'Maqaola'; break;
    case 'yad-amila': categorieKey = 'yad-amila'; categorieName = 'Yad Amila'; break;
  }
  repFilters.categorie = categorieKey;
  toast(`🔍 ${categorieName}`);
  showSection('repertoire', true);
  renderRepertoire();
}

function filterByVilleFromStats() {
  const villes = [...new Set(dbData.map(d => d.ville).filter(v => v && v !== 'null' && v.trim()))];
  if(villes.length === 0) { toast('⚠️ Aucune ville'); return; }
  showList('Filtrer par Ville', villes.sort(), (ville) => {
    if(ville) { resetRepFilters(); repFilters.ville = ville; toast(`🔍 ${ville}`); showSection('repertoire', true); renderRepertoire(); }
  });
}

function filterByDomaineFromStats() {
  const domaines = [...new Set(dbData.map(d => d.domaine).filter(d => d && d !== 'null' && d.trim()))];
  if(domaines.length === 0) { toast('⚠️ Aucun domaine'); return; }
  showList('Filtrer par Domaine', domaines.sort(), (domaine) => {
    if(domaine) { resetRepFilters(); repFilters.domaine = domaine; toast(`🔍 ${domaine}`); showSection('repertoire', true); renderRepertoire(); }
  });
}

// ==================== REPERTOIRE FILTER ====================
function getAvailableCategoriesForCurrentType() {
  let data = [...dbData];
  if(repFilters.type) data = data.filter(d => d.type === repFilters.type);
  const categories = [...new Set(data.map(d => d.categorie).filter(c => c))];
  return categories.map(c => catNameMap[c]).filter(c => c);
}

function getFilteredRepertoire(){
  let data=[...dbData];
  if(repFilters.type) data=data.filter(d=>d.type===repFilters.type);
  if(repFilters.categorie) data=data.filter(d=>d.categorie===repFilters.categorie);
  if(repFilters.ville) data=data.filter(d=>normalizeStr(d.ville)===normalizeStr(repFilters.ville));
  if(repFilters.domaine) data=data.filter(d=>normalizeStr(d.domaine)===normalizeStr(repFilters.domaine));
  if(repFilters.search&&repFilters.search.trim()){
    const q=repFilters.search.trim();
    data=data.filter(d=>
      fieldMatches(d.name,q)||fieldMatches(d.domaine,q)||
      fieldMatches(d.specialite,q)||fieldMatches(d.ville,q)||
      fieldMatches(d.phone,q)||fieldMatches(d.email,q)||
      fieldMatches(d.web,q)
    );
  }
  return data.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
}

function getRepVilles(){
  let data=[...dbData];
  if(repFilters.type) data=data.filter(d=>d.type===repFilters.type);
  if(repFilters.categorie) data=data.filter(d=>d.categorie===repFilters.categorie);
  if(repFilters.domaine) data=data.filter(d=>d.domaine===repFilters.domaine);
  return[...new Set(data.map(d=>d.ville).filter(v=>v&&v!=='null'&&v.trim()))].sort((a,b)=>a.localeCompare(b));
}

function getRepDomaines(){
  let data=[...dbData];
  if(repFilters.type) data=data.filter(d=>d.type===repFilters.type);
  if(repFilters.categorie) data=data.filter(d=>d.categorie===repFilters.categorie);
  if(repFilters.ville) data=data.filter(d=>d.ville===repFilters.ville);
  return[...new Set(data.map(d=>d.domaine).filter(v=>v&&v!=='null'&&v.trim()))].sort((a,b)=>a.localeCompare(b));
}

function resetRepFilters(){
  repFilters={type:null,categorie:null,ville:null,domaine:null,search:''};
  const si=$('searchInput');if(si){si.value='';$('repSearchWrap').classList.remove('search-active');}
  updateRepFilterUI();renderRepertoire();
}

function updateRepFilterUI(){
  $('filterTypeBtn').classList.toggle('active',!!repFilters.type);
  $('filterCatBtn').classList.toggle('active',!!repFilters.categorie);
  $('filterVilleBtn').classList.toggle('active',!!repFilters.ville);
  $('filterDomaineBtn').classList.toggle('active',!!repFilters.domaine);
  const c=$('activeFilters');if(!c)return;
  let h='';
  if(repFilters.type) h+=`<div class="active-filter-tag"><i class="fas fa-tag"></i> ${repFilters.type==='fournisseurs'?'Fournisseurs':'Experts'} <button onclick="removeRepFilter('type')">✕</button></div>`;
  if(repFilters.categorie) h+=`<div class="active-filter-tag"><i class="fas fa-layer-group"></i> ${catNameMap[repFilters.categorie]} <button onclick="removeRepFilter('categorie')">✕</button></div>`;
  if(repFilters.ville) h+=`<div class="active-filter-tag"><i class="fas fa-map-marker-alt"></i> ${escHtml(repFilters.ville)} <button onclick="removeRepFilter('ville')">✕</button></div>`;
  if(repFilters.domaine) h+=`<div class="active-filter-tag"><i class="fas fa-folder"></i> ${escHtml(repFilters.domaine)} <button onclick="removeRepFilter('domaine')">✕</button></div>`;
  if(repFilters.search) h+=`<div class="active-filter-tag"><i class="fas fa-search"></i> "${escHtml(repFilters.search)}" <button onclick="removeRepFilter('search')">✕</button></div>`;
  c.innerHTML=h;
}

function removeRepFilter(k){
  if(k==='type')repFilters.type=null;
  else if(k==='categorie')repFilters.categorie=null;
  else if(k==='ville')repFilters.ville=null;
  else if(k==='domaine')repFilters.domaine=null;
  else if(k==='search'){repFilters.search='';const si=$('searchInput');if(si){si.value='';$('repSearchWrap').classList.remove('search-active');}}
  updateRepFilterUI();renderRepertoire();
}

// ==================== RENDER ====================
function buildContactRow(item,source='db'){
  const color=getColor(item.name);
  const init=getInitials(item.name);
  let metaParts = [];
  if(item.domaine) metaParts.push(item.domaine);
  if(item.ville) metaParts.push(item.ville);
  if(item.specialite && item.specialite !== 'Général') metaParts.push(item.specialite);
  let meta = metaParts.join(' · ');
  let badges='';
  if(source==='db'){
    const tl=item.type==='fournisseurs'?'Fourn.':'Expert';
    const tc=item.type==='fournisseurs'?'cb-green':'cb-blue';
    badges+=`<span class="cbadge ${tc}">${tl}</span>`;
    if(item.categorie&&catNameMap[item.categorie])
      badges+=`<span class="cbadge ${catColorMap[item.categorie]}">${catNameMap[item.categorie]}</span>`;
  }
  const enc=encodeURIComponent(JSON.stringify(item));
  return`<div class="contact-row" onclick="openDetailModal('${enc}')">
    <div class="contact-avatar" style="background:${color}">${init}</div>
    <div class="contact-info">
      <div class="contact-name">${escHtml(item.name)}</div>
      <div class="contact-meta">${meta?`${escHtml(meta)}`:'Aucune info'}</div>
    </div>
    <div class="contact-right"><div class="contact-badges">${badges}</div></div>
  </div>`;
}

function renderRepertoire(){
  const filtered=getFilteredRepertoire();
  const hasAny=Object.values(repFilters).some(v=>v&&v!='');
  const ri=$('resultInfo');
  if(hasAny){
    ri.innerHTML=`<i class="fas fa-filter"></i> ${filtered.length} résultat(s)`;
    ri.classList.add('visible');
  }else{ri.classList.remove('visible');}
  $('contactList').innerHTML=filtered.length
    ?filtered.map(i=>buildContactRow(i,'db')).join('')
    :`<div class="empty-state"><div class="empty-icon"><i class="fas fa-user-slash"></i></div><div class="empty-title">Aucun résultat</div><div class="empty-sub">Modifiez vos filtres</div></div>`;
  updateRepFilterUI();
}

// ==================== DETAIL MODAL (with WhatsApp) ====================
function openDetailModal(enc){
  const item=JSON.parse(decodeURIComponent(enc));
  const color=getColor(item.name);
  $('modalAvatar').style.background=color;
  $('modalAvatar').textContent=getInitials(item.name);
  $('modalName').textContent=item.name;
  $('modalType').textContent=item.domaine||(item.type==='fournisseurs'?'Fournisseur':'Expert');
  let bh='';
  if(item.type)bh+=`<span class="cbadge ${item.type==='fournisseurs'?'cb-green':'cb-blue'}">${item.type==='fournisseurs'?'Fournisseur':'Expert'}</span>`;
  if(item.categorie&&catNameMap[item.categorie])bh+=`<span class="cbadge ${catColorMap[item.categorie]}">${catNameMap[item.categorie]}</span>`;
  $('modalBadges').innerHTML=bh;
  const hp=item.phone&&item.phone!='null'&&item.phone.trim();
  const he=item.email&&item.email!='null'&&item.email.trim();
  const hw=item.web&&item.web!='null'&&item.web.startsWith('http');
  const rows=[
    item.domaine&&{icon:'fa-folder',label:'Domaine',value:item.domaine},
    item.specialite&&item.specialite!='Général'&&{icon:'fa-cog',label:'Spécialité',value:item.specialite},
    item.ville&&{icon:'fa-map-marker-alt',label:'Ville',value:item.ville},
    hp&&{icon:'fa-phone-alt',label:'Téléphone',value:item.phone},
    he&&{icon:'fa-envelope',label:'Email',value:item.email},
    hw&&{icon:'fa-globe',label:'Site Web',value:item.web},
  ].filter(Boolean);
  $('modalBody').innerHTML=rows.map(r=>`<div class="modal-row"><div class="modal-icon"><i class="fas ${r.icon}"></i></div><div><div class="modal-row-label">${r.label}</div><div class="modal-row-value">${escHtml(r.value)}</div></div></div>`).join('');
  let ah='';
  if(hp){
    ah+=`<button class="modal-action-btn" onclick="window.location.href='tel:${item.phone}'"><i class="fas fa-phone-alt"></i><span>Appeler</span></button>`;
    // WhatsApp button
    let waNumber = item.phone.replace(/[^0-9+]/g, '');
    if(waNumber.startsWith('0')) waNumber = '212' + waNumber.substring(1);
    if(waNumber.startsWith('+')) waNumber = waNumber.substring(1);
    ah+=`<button class="modal-action-btn whatsapp" onclick="window.open('https://wa.me/${waNumber}','_blank')"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></button>`;
  }
  if(he) ah+=`<button class="modal-action-btn" onclick="window.location.href='mailto:${item.email}'"><i class="fas fa-envelope"></i><span>Email</span></button>`;
  if(hw) ah+=`<button class="modal-action-btn" onclick="window.open('${item.web}','_blank')"><i class="fas fa-globe"></i><span>Site Web</span></button>`;
  if(hp) ah+=`<button class="modal-action-btn save" onclick="saveVCF('${escHtml(item.name)}','${item.phone}','${item.email||''}','${item.web||''}')"><i class="fas fa-save"></i><span>Contact</span></button>`;
  if(isAdmin&&item.id){
    ah+=`<div style="display:flex;gap:8px;margin-top:6px;padding-top:8px;border-top:0.5px solid var(--divider);width:100%;justify-content:center">
      <button class="modal-action-btn" onclick="closeDetailModal();openEditModal('${item.id}')"><i class="fas fa-pen"></i><span>Modifier</span></button>
      <button class="modal-action-btn" onclick="closeDetailModal();openDeleteModal('${item.id}')"><i class="fas fa-trash-alt"></i><span>Supprimer</span></button>
    </div>`;
  }
  $('modalActions').innerHTML=ah;
  $('detailModal').classList.add('show');
}
function closeDetailModal(){$('detailModal').classList.remove('show');}

function saveVCF(n,p,e,w){
  const d=`BEGIN:VCARD\nVERSION:3.0\nFN:${n}\nTEL:${p}\n${e?'EMAIL:'+e+'\n':''}${w?'URL:'+w+'\n':''}END:VCARD`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([d],{type:'text/vcard'}));
  a.download=`${n.replace(/[^a-z0-9]/gi,'_')}.vcf`;document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('📇 Contact sauvegardé');
}

// ==================== FILTER MODALS ====================
let _listSelectFn=null;
function showList(title,items,onSelect){
  $('listTitle').innerHTML=`<i class="fas fa-list"></i> ${title}`;
  _listSelectFn=onSelect;
  $('listItems').innerHTML=
    `<div class="menu-item" onclick="_listSelectFn(null);closeModal('listModal')"><div class="menu-icon" style="background:var(--blue-dim);color:var(--blue)"><i class="fas fa-undo"></i></div><span class="menu-label">Tous</span></div>`+
    items.map(item=>`<div class="menu-item" onclick="_listSelectFn('${escHtml(item)}');closeModal('listModal')"><div class="menu-icon" style="background:var(--blue-dim);color:var(--blue)"><i class="fas fa-tag"></i></div><span class="menu-label">${escHtml(item)}</span></div>`).join('');
  $('listModal').classList.add('show');
}

function showTypeFilter(){
  showList('Type',['Fournisseurs','Experts'],v=>{
    if(v==='Fournisseurs')repFilters.type='fournisseurs';
    else if(v==='Experts')repFilters.type='experts';
    else repFilters.type=null;
    repFilters.categorie=null;
    renderRepertoire();
  });
}

function showCatFilter(){
  let availableCats = getAvailableCategoriesForCurrentType();
  if(availableCats.length === 0){ toast('⚠️ Aucune catégorie disponible'); return; }
  showList('Catégorie', availableCats, v=>{
    if(v==='Services')repFilters.categorie='services';
    else if(v==='Produits')repFilters.categorie='products';
    else if(v==='Maqaola')repFilters.categorie='maqola';
    else if(v==='Yad Amila')repFilters.categorie='yad-amila';
    else repFilters.categorie=null;
    renderRepertoire();
  });
}

function showVilleFilter(){
  const v=getRepVilles();
  if(!v.length){toast('⚠️ Aucune ville');return;}
  showList('Villes',v,val=>{repFilters.ville=val;renderRepertoire();});
}
function showDomaineFilter(){
  const d=getRepDomaines();
  if(!d.length){toast('⚠️ Aucun domaine');return;}
  showList('Domaines',d,val=>{repFilters.domaine=val;renderRepertoire();});
}

// ==================== EXPLORER (Deep Navigation like File Explorer) ====================
function renderExplorer(){
  const bc=$('explorerBreadcrumb');
  let bch=`<div class="bc" onclick="goExplorerLevel(0)"><i class="fas fa-home"></i> Accueil</div>`;
  explorerStack.forEach((item,idx)=>{
    let label = '';
    if(item.type) label = item.type === 'fournisseurs' ? 'Fournisseurs' : 'Experts';
    else if(item.domaine) label = item.domaine;
    else if(item.specialite) label = item.specialite;
    bch+=`<span class="bc-sep">›</span><div class="bc" onclick="goExplorerLevel(${idx+1})">${escHtml(label)}</div>`;
  });
  bc.innerHTML=bch;
  
  const c=$('explorerContent');
  
  if(explorerStack.length === 0){
    // Level 0: Show types (Fournisseurs / Experts)
    c.innerHTML=`
      <div class="exp-row" onclick="explorerNavigateTo('type','fournisseurs')">
        <div class="exp-icon"><i class="fas fa-industry"></i></div>
        <div><div class="exp-name">Fournisseurs</div><div class="exp-count">${dbData.filter(d=>d.type==='fournisseurs').length} professionnels</div></div>
        <i class="fas fa-chevron-right exp-arrow"></i>
      </div>
      <div class="exp-row" onclick="explorerNavigateTo('type','experts')">
        <div class="exp-icon" style="background:var(--blue-dim);color:var(--blue)"><i class="fas fa-microchip"></i></div>
        <div><div class="exp-name">Experts</div><div class="exp-count">${dbData.filter(d=>d.type==='experts').length} professionnels</div></div>
        <i class="fas fa-chevron-right exp-arrow"></i>
      </div>`;
  }
  else if(explorerStack.length === 1){
    // Level 1: Show domaines for selected type
    const type = explorerStack[0].type;
    const domaines = {};
    dbData.filter(d => d.type === type).forEach(i => {
      const d = i.domaine || 'Autre';
      domaines[d] = (domaines[d] || 0) + 1;
    });
    if(Object.keys(domaines).length === 0){
      c.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-folder-open"></i></div><div class="empty-title">Aucun domaine</div></div>`;
    } else {
      c.innerHTML = Object.entries(domaines).sort().map(([d,cnt]) => `
        <div class="exp-row" onclick="explorerNavigateTo('domaine','${escHtml(d)}')">
          <div class="exp-icon"><i class="fas fa-folder"></i></div>
          <div><div class="exp-name">${escHtml(d)}</div><div class="exp-count">${cnt} professionnels</div></div>
          <i class="fas fa-chevron-right exp-arrow"></i>
        </div>
      `).join('');
    }
  }
  else if(explorerStack.length === 2){
    // Level 2: Show specialites for selected type + domaine
    const type = explorerStack[0].type;
    const domaine = explorerStack[1].domaine;
    const specialites = {};
    dbData.filter(d => d.type === type && (d.domaine || 'Autre') === domaine).forEach(i => {
      const s = i.specialite || 'Général';
      specialites[s] = (specialites[s] || 0) + 1;
    });
    if(Object.keys(specialites).length === 0){
      c.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-cog"></i></div><div class="empty-title">Aucune spécialité</div></div>`;
    } else {
      c.innerHTML = Object.entries(specialites).sort().map(([s,cnt]) => `
        <div class="exp-row" onclick="explorerNavigateTo('specialite','${escHtml(s)}')">
          <div class="exp-icon" style="background:var(--orange-dim);color:var(--orange)"><i class="fas fa-cog"></i></div>
          <div><div class="exp-name">${escHtml(s)}</div><div class="exp-count">${cnt} professionnels</div></div>
          <i class="fas fa-chevron-right exp-arrow"></i>
        </div>
      `).join('');
    }
  }
  else if(explorerStack.length === 3){
    // Level 3: Show contacts list
    const type = explorerStack[0].type;
    const domaine = explorerStack[1].domaine;
    const specialite = explorerStack[2].specialite;
    const items = dbData.filter(d => 
      d.type === type && 
      (d.domaine || 'Autre') === domaine && 
      (d.specialite || 'Général') === specialite
    );
    if(items.length === 0){
      c.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-user-slash"></i></div><div class="empty-title">Aucun professionnel</div></div>`;
    } else {
      c.innerHTML = items.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(i => buildContactRow(i,'db')).join('');
    }
  }
}

function goExplorerLevel(level){
  explorerStack = explorerStack.slice(0, level);
  renderExplorer();
}

function explorerNavigateTo(type, value){
  if(type === 'type'){
    explorerStack = [{ type: value }];
  } else if(type === 'domaine'){
    explorerStack.push({ domaine: value });
  } else if(type === 'specialite'){
    explorerStack.push({ specialite: value });
  }
  renderExplorer();
}

// ==================== STATS ====================
function updateStats(){
  $('statFour').textContent=dbData.filter(d=>d.type==='fournisseurs').length;
  $('statExp').textContent=dbData.filter(d=>d.type==='experts').length;
  $('statVilles').textContent=new Set(dbData.map(d=>d.ville).filter(v=>v&&v!='null'&&v.trim())).size;
  $('statDomaines').textContent=new Set(dbData.map(d=>d.domaine).filter(d=>d&&d!='null'&&d.trim())).size;
  $('statServices').textContent=dbData.filter(d=>d.categorie==='services').length;
  $('statProduits').textContent=dbData.filter(d=>d.categorie==='products').length;
  $('statMaqola').textContent=dbData.filter(d=>d.categorie==='maqola').length;
  $('statYadAmila').textContent=dbData.filter(d=>d.categorie==='yad-amila').length;
  $('headerSub').textContent=`${dbData.length} professionnels · ${new Set(dbData.map(d=>d.domaine).filter(Boolean)).size} domaines`;
}

// ==================== CRUD ====================
function openAddModal(){
  $('editTitle').innerHTML='<i class="fas fa-plus-circle"></i> Ajouter';
  ['editId','editName','editDomaine','editSpecialite','editVille','editPhone','editEmail','editWeb'].forEach(id=>$(id).value='');
  $('editType').value='fournisseurs';$('editCat').value='services';
  $('editModal').classList.add('show');
}
function openEditModal(id){
  const item=dbData.find(i=>i.id===id);if(!item)return;
  $('editTitle').innerHTML='<i class="fas fa-pen"></i> Modifier';
  $('editId').value=item.id;$('editName').value=item.name;
  $('editType').value=item.type;$('editCat').value=item.categorie;
  $('editDomaine').value=item.domaine||'';$('editSpecialite').value=item.specialite||'';
  $('editVille').value=item.ville||'';$('editPhone').value=item.phone||'';
  $('editEmail').value=item.email||'';$('editWeb').value=item.web||'';
  $('editModal').classList.add('show');
}
async function saveItem(){
  const id=$('editId').value;
  const itemData={
    id:id||`${Date.now()}_${Math.random().toString(36).slice(2)}`,
    name:$('editName').value.trim(),type:$('editType').value,
    categorie:$('editCat').value,domaine:$('editDomaine').value||'Autre',
    specialite:$('editSpecialite').value||'Général',
    ville:$('editVille').value||'',phone:formatPhone($('editPhone').value),
    email:$('editEmail').value||'',web:$('editWeb').value||''
  };
  if(!itemData.name){toast('⚠️ Nom requis');return;}
  showLoading(true);
  try{
    const oldItem=id?dbData.find(i=>i.id===id):null;
    if(oldItem&&(oldItem.type!==itemData.type||oldItem.categorie!==itemData.categorie)){
      const op=`professionals/${typeMap[oldItem.type]}/${categoryMap[oldItem.categorie]}`;
      const os=await dbRef.ref(op).once('value');
      await dbRef.ref(op).set((os.val()||[]).filter(i=>i.id!==id));
    }
    const path=`professionals/${typeMap[itemData.type]}/${categoryMap[itemData.categorie]}`;
    const snap=await dbRef.ref(path).once('value');
    let arr=snap.val()||[];
    const idx=arr.findIndex(i=>i.id===id);
    if(idx!==-1)arr[idx]=itemData;else arr.push(itemData);
    await dbRef.ref(path).set(arr);
    toast(id?'✅ Modifié':'✅ Ajouté');
    closeModal('editModal');
    await loadDB();
    resetRepFilters();
  }catch(e){toast('❌ Erreur: '+e.message);}
  showLoading(false);
}
function openDeleteModal(id){
  const item=dbData.find(i=>i.id===id);if(!item)return;
  pendingDelete=item;
  $('deleteMsg').innerHTML=`Supprimer <strong>${escHtml(item.name)}</strong> ?`;
  $('deleteModal').classList.add('show');
}
async function confirmDeleteItem(){
  if(!pendingDelete)return;
  showLoading(true);
  try{
    const path=`professionals/${typeMap[pendingDelete.type]}/${categoryMap[pendingDelete.categorie]}`;
    const snap=await dbRef.ref(path).once('value');
    await dbRef.ref(path).set((snap.val()||[]).filter(i=>i.id!==pendingDelete.id));
    toast('🗑️ Supprimé');closeModal('deleteModal');pendingDelete=null;
    await loadDB();resetRepFilters();
  }catch(e){toast('❌ Erreur');}
  showLoading(false);
}

// ==================== SYNC ====================
async function syncToFirebase(){
  if(!confirm('Synchroniser les CSV ?'))return;
  showLoading(true);
  try{
    const structure={
      "FOURNISSEURS":{"SERVICES":[],"PRODUITS":[],"MAQAOLA":[],"YAD AMILA":[]},
      "EXPERTS":{"SERVICES":[],"PRODUITS":[],"MAQAOLA":[],"YAD AMILA":[]}
    };
    csvFournisseurs.forEach((s,i)=>{structure["FOURNISSEURS"]["SERVICES"].push({id:`four_${Date.now()}_${i}`,...s});});
    csvExperts.forEach((e,i)=>{structure["EXPERTS"]["YAD AMILA"].push({id:`exp_${Date.now()}_${i}`,...e});});
    await dbRef.ref('professionals').set(structure);
    toast('✅ Synchronisation réussie');await loadDB();
  }catch(e){toast('❌ Erreur: '+e.message);}
  showLoading(false);
}

// ==================== DATA LOADING ====================
async function loadCSV(url){
  try{
    const res=await fetch(url);const text=await res.text();
    const lines=text.split(/\r?\n/);const data=[];
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(',');
      if(cols[1]){
        data.push({
          name:cols[1]?.replace(/["']/g,'').trim()||'',
          domaine:cols[2]?.replace(/["']/g,'').trim()||'Autre',
          specialite:cols[3]?.replace(/["']/g,'').trim()||'Général',
          ville:cols[4]?.replace(/["']/g,'').trim()||'',
          phone:formatPhone(cols[5]?.replace(/["']/g,'').trim()),
          email:cols[6]?.replace(/["']/g,'').trim()||'',
          web:cols[7]?.replace(/["']/g,'').trim()||''
        });
      }
    }
    return data;
  }catch(e){return[];}
}

async function loadDB(){
  try{
    const snap=await dbRef.ref('professionals').once('value');
    const data=snap.val();dbData=[];
    if(data){
      for(const[ft,to]of Object.entries(data)){
        const type=ft==='FOURNISSEURS'?'fournisseurs':'experts';
        for(const[fc,items]of Object.entries(to)){
          let cat=null;
          if(fc==='SERVICES')cat='services';
          else if(fc==='PRODUITS')cat='products';
          else if(fc==='MAQAOLA')cat='maqola';
          else if(fc==='YAD AMILA')cat='yad-amila';
          if(!cat||!Array.isArray(items))continue;
          for(const item of items){
            if(item?.name)dbData.push({...item,type,categorie:cat,id:item.id||`${type}_${Date.now()}_${Math.random()}`});
          }
        }
      }
    }
    dbData.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    updateStats();renderCurrent();
  }catch(e){toast('❌ Erreur chargement');}
}

// ==================== NAVIGATION ====================
function showSection(id,reset=true){
  if(reset){
    if(id!=='explorer')explorerStack=[];
    if(id!=='repertoire')resetRepFilters();
  }
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  $(id+'Section').classList.add('active');
  document.querySelectorAll('.tab-btn[data-sec]').forEach(b=>b.classList.remove('active'));
  const tb=document.querySelector(`.tab-btn[data-sec="${id}"]`);
  if(tb)tb.classList.add('active');
  currentSection=id;
  if(id==='repertoire')renderRepertoire();
  else if(id==='explorer')renderExplorer();
  window.scrollTo({top:0,behavior:'smooth'});
}

function handleSectionClick(id){
  if(currentSection===id){
    if(window.scrollY>10)window.scrollTo({top:0,behavior:'smooth'});
    else if(id==='repertoire'){resetRepFilters();toast('🔍 Filtres réinitialisés');}
    else if(id==='explorer'){explorerStack=[];renderExplorer();toast('↺ Explorer réinitialisé');}
  }else showSection(id,true);
}

function renderCurrent(){
  if(currentSection==='repertoire')renderRepertoire();
  else if(currentSection==='explorer')renderExplorer();
}

// ==================== ADMIN ====================
function verifyAdmin(){
  if($('adminPass').value===ADMIN_PASSWORD){
    isAdmin=true;sessionStorage.setItem('adminMode','true');
    document.body.classList.add('admin-mode');
    $('adminBtn').classList.add('admin-on');
    closeModal('adminModal');toast('✅ Mode Admin activé');
    renderCurrent();
  }else toast('❌ Mot de passe incorrect');
}
function logoutAdmin(){
  isAdmin=false;sessionStorage.removeItem('adminMode');
  document.body.classList.remove('admin-mode');
  $('adminBtn').classList.remove('admin-on');
  toast('👤 Mode utilisateur');renderCurrent();
}
function checkAdminStatus(){
  if(sessionStorage.getItem('adminMode')==='true'){
    isAdmin=true;document.body.classList.add('admin-mode');$('adminBtn').classList.add('admin-on');
  }
}

let isDark=true;
function toggleTheme(){
  isDark=!isDark;document.body.classList.toggle('light',!isDark);
  localStorage.setItem('theme',isDark?'dark':'light');
  $('themeBtn').innerHTML=isDark?'<i class="fas fa-moon"></i>':'<i class="fas fa-sun"></i>';

  showLoading(true);checkAdminStatus();
  const[experts,fours]=await Promise.all([loadCSV(CSV_EXPERTS),loadCSV(CSV_FOURNISSEURS)]);
  csvExperts=experts;csvFournisseurs=fours;
  await loadDB();
  setTimeout(()=>showLoading(false),500);
