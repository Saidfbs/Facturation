<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#075E54">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Connect Industry">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/manifest+json,{
  \"name\": \"Connect Industry B2B Maroc\",
  \"short_name\": \"CI B2B\",
  \"description\": \"Les Fournisseurs Industriels du Maroc\",
  \"start_url\": \".\",
  \"display\": \"standalone\",
  \"theme_color\": \"#075E54\",
  \"background_color\": \"#075E54\",
  \"icons\": [
    {\"src\": \"https://via.placeholder.com/192x192/075E54/white?text=CI\",\"sizes\": \"192x192\",\"type\": \"image/png\"},
    {\"src\": \"https://via.placeholder.com/512x512/075E54/white?text=CI\",\"sizes\": \"512x512\",\"type\": \"image/png\"}
  ]
}">
<title>Connect Industry | Fournisseurs Industriels du Maroc</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

/* WhatsApp Colors */
:root{
  --whatsapp-green: #075E54;
  --whatsapp-teal: #128C7E;
  --whatsapp-light: #25D366;
  --whatsapp-bg-dark: #111B21;
  --whatsapp-chat-dark: #202C33;
  --whatsapp-input-dark: #2A3942;
  --whatsapp-border-dark: #303D45;
  --text-primary-dark: #E9EDEF;
  --text-secondary-dark: #8696A0;
  
  --whatsapp-bg-light: #ECE5DD;
  --whatsapp-chat-light: #FFFFFF;
  --text-primary-light: #111B21;
  --text-secondary-light: #667781;
  
  /* Default dark theme (WhatsApp style) */
  --bg: #111B21;
  --bg2: #202C33;
  --bg3: #2A3942;
  --card: #202C33;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.12);
  --text: #E9EDEF;
  --text2: #8696A0;
  --text3: #667781;
  --accent: #25D366;
  --accent2: #128C7E;
  --accent-glow: rgba(37,211,102,0.25);
  --green: #25D366;
  --green-bg: rgba(37,211,102,0.1);
  --orange: #FF8C00;
  --red: #E81123;
  --red-bg: rgba(232,17,35,0.12);
  --purple: #9B4F96;
  --teal: #00A7AF;
  
  --nav-h: 56px;
  --hdr-h: 56px;
  --safe-bottom: env(safe-area-inset-bottom,0px);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.1);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.2);
  --radius-sm: 12px;
  --radius-md: 16px;
  --radius-lg: 20px;
  --radius-full: 9999px;
  --font-family: 'Inter', sans-serif;
}

body.light{
  --bg: #ECE5DD;
  --bg2: #FFFFFF;
  --card: #FFFFFF;
  --bg3: #F0F2F5;
  --surface: rgba(0,0,0,0.03);
  --surface2: rgba(0,0,0,0.06);
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.12);
  --text: #111B21;
  --text2: #667781;
  --text3: #8696A0;
  --accent-glow: rgba(37,211,102,0.15);
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-family);
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* WhatsApp Header */
.whatsapp-header{
  position:fixed;top:0;left:0;right:0;
  background:var(--whatsapp-green);
  padding:12px 16px;
  padding-top:max(12px, env(safe-area-inset-top));
  z-index:500;
  display:flex;align-items:center;
  justify-content:space-between;
}
.header-left{display:flex;align-items:center;gap:12px;}
.header-logo h1{font-size:1.1rem;font-weight:600;color:white;}
.header-logo p{font-size:0.6rem;color:rgba(255,255,255,0.8);margin-top:2px;}
.header-actions{display:flex;gap:8px;}
.header-actions button{
  background:rgba(255,255,255,0.1);
  border:none;width:36px;height:36px;
  border-radius:50%;color:white;font-size:1rem;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:background 0.2s;
}
.header-actions button:active{background:rgba(255,255,255,0.2);}
#appTime{font-size:0.6rem;color:white;opacity:0.8;margin-left:8px;}

/* WhatsApp Bottom Navigation */
.whatsapp-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg2);
  display:flex;
  padding:8px 16px;
  padding-bottom:max(8px, var(--safe-bottom));
  z-index:500;
  border-top:1px solid var(--border);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  background:transparent;border:none;cursor:pointer;
  color:var(--text2);font-size:0.6rem;font-weight:500;
  padding:8px 0;transition:color 0.2s;
  border-radius:var(--radius-sm);
}
.nav-item i{font-size:1.2rem;}
.nav-item.active{color:var(--accent);}
.admin-only{display:none!important;}
body.admin-mode .admin-only{display:flex!important;}

/* Main Content */
.main{
  padding-top:76px;
  padding-bottom:72px;
  min-height:100vh;
}
.section{display:none;padding:0 16px 20px;}
.section.active{display:block;}

/* WhatsApp Banner */
.whatsapp-banner{
  background:linear-gradient(135deg, var(--whatsapp-green), var(--whatsapp-teal));
  margin:-16px -16px 20px -16px;
  padding:24px 20px 28px;
  position:relative;overflow:hidden;
}
.whatsapp-banner h1{
  font-size:0.9rem;font-weight:600;color:white;
  display:flex;align-items:center;gap:8px;
}
.whatsapp-banner p{
  font-size:0.6rem;color:rgba(255,255,255,0.8);margin-top:6px;
}

/* WhatsApp Stats Cards */
.stats-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px;
}
.stat-card{
  background:var(--card);border-radius:var(--radius-md);
  padding:16px;display:flex;align-items:center;gap:12px;
  border:1px solid var(--border);cursor:pointer;
  transition:all 0.15s;
  box-shadow:var(--shadow-sm);
}
.stat-card:active{transform:scale(0.98);background:var(--surface);}
.stat-icon{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;flex-shrink:0;
}
.stat-icon.blue{background:rgba(37,211,102,0.15);color:var(--accent);}
.stat-icon.green{background:rgba(37,211,102,0.15);color:var(--accent);}
.stat-icon.orange{background:rgba(255,140,0,0.15);color:var(--orange);}
.stat-icon.purple{background:rgba(155,79,150,0.15);color:var(--purple);}
.stat-icon.teal{background:rgba(0,167,175,0.15);color:var(--teal);}
.stat-num{font-size:1.3rem;font-weight:700;color:var(--text);line-height:1;}
.stat-lbl{font-size:0.55rem;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;}

/* WhatsApp Search */
.search-bar{
  background:transparent;padding:12px 0;position:sticky;top:76px;z-index:100;
}
.search-container{
  display:flex;align-items:center;gap:12px;
  background:var(--bg3);border-radius:var(--radius-full);
  padding:10px 16px;border:1px solid var(--border);
}
.search-container i{color:var(--text2);font-size:0.85rem;}
.search-container input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:0.8rem;font-family:inherit;
}
.search-container input::placeholder{color:var(--text3);}
.search-clear{
  width:24px;height:24px;border-radius:50%;
  background:var(--text3);border:none;cursor:pointer;
  color:white;display:none;align-items:center;
  justify-content:center;font-size:0.55rem;
}
.search-active .search-clear{display:flex;}

/* WhatsApp Filter Chips */
.filter-row{
  display:flex;gap:10px;padding:12px 0;
  overflow-x:auto;scrollbar-width:none;
}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-full);padding:6px 16px;
  cursor:pointer;color:var(--text2);font-size:0.65rem;
  font-weight:500;white-space:nowrap;transition:all 0.15s;
  flex-shrink:0;
}
.filter-chip i{font-size:0.6rem;}
.filter-chip:active{background:var(--surface);}
.filter-chip.active{background:var(--accent);color:white;border-color:var(--accent);}
.filter-chip.reset:active{border-color:var(--red);color:var(--red);}

.active-filters{
  display:flex;gap:8px;flex-wrap:wrap;padding:8px 0;
}
.filter-tag{
  background:rgba(37,211,102,0.15);
  padding:4px 12px;border-radius:var(--radius-full);
  font-size:0.6rem;color:var(--accent);
  display:inline-flex;align-items:center;gap:8px;
}
.filter-tag button{
  background:none;border:none;cursor:pointer;
  color:var(--accent);font-size:0.65rem;
}

.result-info{
  background:var(--card);border-radius:var(--radius-full);
  padding:8px 16px;font-size:0.65rem;
  color:var(--text2);display:none;align-items:center;gap:8px;
  margin:8px 0;width:fit-content;
}
.result-info.visible{display:flex;}

/* WhatsApp Contact List */
.contact-item{
  display:flex;align-items:center;
  padding:12px 0;border-bottom:1px solid var(--border);
  cursor:pointer;gap:14px;transition:all 0.15s;
}
.contact-item:active{background:var(--surface);margin:0 -16px;padding:12px 16px;}
.contact-avatar{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:1rem;color:white;flex-shrink:0;
}
.contact-info{flex:1;min-width:0;}
.contact-name{font-weight:600;font-size:0.85rem;color:var(--text);margin-bottom:4px;}
.contact-details{
  font-size:0.6rem;color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.contact-badges{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;}
.badge{
  font-size:0.45rem;padding:2px 8px;border-radius:var(--radius-full);
  font-weight:500;
}
.badge-fourn{background:rgba(37,211,102,0.15);color:var(--accent);}
.badge-expert{background:rgba(37,211,102,0.15);color:var(--accent);}
.badge-service{background:rgba(37,211,102,0.15);color:var(--accent);}
.badge-product{background:rgba(255,140,0,0.15);color:var(--orange);}
.badge-maqola{background:rgba(255,140,0,0.15);color:var(--orange);}
.badge-yad{background:rgba(155,79,150,0.15);color:var(--purple);}

/* WhatsApp Explorer */
.explorer-breadcrumb{
  display:flex;gap:6px;flex-wrap:wrap;padding:12px 0;
}
.bc{font-size:0.65rem;color:var(--text2);cursor:pointer;padding:4px 8px;border-radius:var(--radius-full);}
.bc:active{background:var(--surface);}
.bc-sep{color:var(--text3);}
.explorer-item{
  display:flex;align-items:center;padding:14px 0;
  border-bottom:1px solid var(--border);cursor:pointer;gap:14px;
  transition:all 0.15s;
}
.explorer-item:active{background:var(--surface);margin:0 -16px;padding:14px 16px;}
.explorer-icon{
  width:48px;height:48px;border-radius:50%;
  background:rgba(37,211,102,0.1);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);font-size:1rem;flex-shrink:0;
}
.explorer-name{font-weight:500;font-size:0.85rem;color:var(--text);}
.explorer-count{font-size:0.6rem;color:var(--text2);margin-top:2px;}
.explorer-arrow{color:var(--text3);margin-left:auto;font-size:0.7rem;}

/* WhatsApp Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  backdrop-filter:blur(4px);z-index:800;
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transition:0.2s;
  padding:16px;
}
.modal-overlay.show{opacity:1;visibility:visible;}
.modal-container{
  background:var(--card);width:100%;max-width:360px;
  border-radius:24px;overflow:hidden;
  animation:modalPop 0.2s ease;max-height:85vh;overflow-y:auto;
}
@keyframes modalPop{from{transform:scale(0.95) translateY(20px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.modal-header{
  background:var(--bg3);padding:20px 20px 16px;
  text-align:center;position:relative;
  border-bottom:1px solid var(--border);
}
.modal-close{
  position:absolute;top:12px;right:12px;
  width:32px;height:32px;border-radius:50%;
  background:transparent;border:none;cursor:pointer;
  color:var(--text2);font-size:0.8rem;
}
.modal-avatar{
  width:80px;height:80px;border-radius:50%;
  margin:0 auto 10px;display:flex;align-items:center;
  justify-content:center;font-size:1.3rem;font-weight:600;color:white;
}
.modal-name{font-size:1rem;font-weight:600;color:var(--text);}
.modal-type{font-size:0.6rem;color:var(--text2);margin-top:4px;}
.modal-badges{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
.modal-body{padding:16px;}
.modal-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);}
.modal-row:last-child{border-bottom:none;}
.modal-icon{width:32px;color:var(--accent);font-size:0.85rem;text-align:center;}
.modal-row-label{font-size:0.55rem;color:var(--text2);text-transform:uppercase;margin-bottom:2px;}
.modal-row-value{font-size:0.75rem;color:var(--text);word-break:break-word;}
.modal-actions{
  display:flex;justify-content:center;gap:12px;
  padding:16px;border-top:1px solid var(--border);flex-wrap:wrap;
}
.modal-btn{
  min-width:60px;padding:8px 12px;border-radius:var(--radius-md);
  background:var(--surface);border:1px solid var(--border);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  gap:4px;transition:0.1s;color:var(--text2);
}
.modal-btn i{font-size:1rem;}
.modal-btn span{font-size:0.45rem;font-weight:500;}
.modal-btn:active{background:var(--surface2);border-color:var(--accent);color:var(--accent);}
.modal-btn.whatsapp:active{border-color:var(--accent);color:var(--accent);}

/* WhatsApp Sheet */
.sheet-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);z-index:700;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;visibility:hidden;transition:0.2s;
}
.sheet-overlay.show{opacity:1;visibility:visible;}
.sheet{
  background:var(--card);width:100%;max-width:480px;
  border-radius:24px 24px 0 0;
  max-height:85vh;overflow-y:auto;
  animation:sheetUp 0.2s ease;
}
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:var(--card);z-index:1;
}
.sheet-header h3{font-size:0.9rem;font-weight:600;color:var(--text);}
.sheet-header h3 i{color:var(--accent);margin-right:6px;}
.sheet-close{
  width:32px;height:32px;border-radius:50%;
  background:transparent;border:none;cursor:pointer;
  color:var(--text2);font-size:0.8rem;
}
.sheet-body{padding:20px;}
.form-group{margin-bottom:16px;}
.form-group label{font-size:0.6rem;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;}
.form-input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;color:var(--text);
  font-size:0.75rem;outline:none;font-family:inherit;
  transition:all 0.1s;
}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow);}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 18px;border-radius:12px;cursor:pointer;
  font-weight:500;border:none;transition:0.1s;
  font-size:0.7rem;font-family:inherit;
}
.btn-primary{background:var(--accent);color:white;}
.btn-primary:active{background:var(--accent2);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-ghost:active{background:var(--surface);}
.btn-danger{background:rgba(232,17,35,0.15);color:var(--red);}
.btn-full{width:100%;justify-content:center;}
.menu-item{
  display:flex;align-items:center;gap:14px;
  padding:14px 20px;cursor:pointer;border-bottom:1px solid var(--border);
  transition:0.1s;
}
.menu-item:active{background:var(--surface);}
.menu-icon{
  width:36px;height:36px;border-radius:50%;
  background:rgba(37,211,102,0.1);
  display:flex;align-items:center;justify-content:center;
  font-size:0.8rem;color:var(--accent);
}
.menu-label{font-size:0.8rem;color:var(--text);}

/* Toast & Loading */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.9);color:white;border-radius:var(--radius-full);
  padding:10px 20px;font-size:0.7rem;z-index:9000;
  opacity:0;visibility:hidden;transition:0.2s;white-space:nowrap;
}
.toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(-6px);}
.loading-screen{
  position:fixed;inset:0;background:var(--whatsapp-green);z-index:9999;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;transition:0.2s;
}
.loading-screen.hide{opacity:0;pointer-events:none;}
.loading-logo{
  width:64px;height:64px;border-radius:50%;
  background:white;display:flex;align-items:center;
  justify-content:center;font-size:1.5rem;font-weight:700;
  color:var(--whatsapp-green);
}
.loading-bar{width:120px;height:2px;background:rgba(255,255,255,0.3);border-radius:99px;overflow:hidden;}
.loading-fill{width:40%;height:100%;background:white;animation:load .9s ease infinite;}
@keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(250%)}}
.empty-state{text-align:center;padding:60px 20px;}
.empty-icon{font-size:2.5rem;color:var(--text2);opacity:0.5;margin-bottom:12px;}
.empty-title{font-size:0.85rem;font-weight:500;}
.empty-sub{font-size:0.6rem;color:var(--text2);margin-top:4px;}

/* Responsive */
@media (max-width: 480px){
  .stats-grid{grid-template-columns:1fr;gap:10px;}
  .modal-container{max-width:320px;}
  .contact-avatar{width:48px;height:48px;}
  .toast{white-space:normal;max-width:85%;text-align:center;}
}
</style>
</head>
<body>

<!-- WhatsApp Header -->
<header class="whatsapp-header">
  <div class="header-left">
    <div class="header-logo">
      <h1>Connect Industry</h1>
      <p>Fournisseurs Industriels du Maroc</p>
    </div>
  </div>
  <div class="header-actions">
    <span id="appTime"></span>
    <button id="themeBtn"><i class="fas fa-moon"></i></button>
    <button id="adminBtn" onclick="openAdminModal()"><i class="fas fa-shield-alt"></i></button>
  </div>
</header>

<!-- WhatsApp Bottom Navigation -->
<nav class="whatsapp-nav">
  <button class="nav-item active" data-sec="home"><i class="fas fa-home"></i><span>Accueil</span></button>
  <button class="nav-item" data-sec="explorer"><i class="fas fa-compass"></i><span>Explorer</span></button>
  <button class="nav-item" data-sec="repertoire"><i class="fas fa-users"></i><span>Répertoire</span></button>
  <button class="nav-item admin-only" id="addBtn"><i class="fas fa-plus-circle"></i><span>Ajouter</span></button>
  <button class="nav-item admin-only" id="syncBtn"><i class="fas fa-cloud-upload-alt"></i><span>Sync</span></button>
</nav>

<main class="main">

  <!-- HOME SECTION -->
  <div id="homeSection" class="section active">
    <div class="whatsapp-banner">
      <h1><i class="fas fa-industry"></i> Les Fournisseurs Industriels</h1>
      <p>La plus grande communauté B2B au Maroc</p>
    </div>
    <div class="stats-grid">
      <div class="stat-card" onclick="filterByTypeFromStats('fournisseurs')">
        <div class="stat-icon blue"><i class="fas fa-industry"></i></div>
        <div><div class="stat-num" id="statFour">0</div><div class="stat-lbl">Fournisseurs</div></div>
      </div>
      <div class="stat-card" onclick="filterByTypeFromStats('experts')">

<script>
// ==================== CONFIG ====================
const CSV_EXPERTS="https://docs.google.com/spreadsheets/d/e/2PACX-1vSjj2c3fjfHowy8yxOfpVAsfXLRVgSQPJQ7PVc4wvI2dI7g0hQwF32QoByKExzadiHivu3oKYRpgWKK/pub?gid=42570462&single=true&output=csv";
const CSV_FOURNISSEURS="https://docs.google.com/spreadsheets/d/e/2PACX-1vT9oFi63lhgtX8h-DstURguy8B5Vv6GmzTqDWIWSEVXDcicvyeZd7iyVX8gZ2ldtMC8YRRVsUOzG92G/pub?gid=587124901&single=true&output=csv";
const ADMIN_PASSWORD="admin123";

const firebaseConfig={
  apiKey:"AIzaSyBQKPqut41Jqs28Zn_z-I_ffD-iNCnFpdU",
  authDomain:"said-rahil-default-rtdb.firebaseio.com",
  databaseURL:"https://said-rahil-default-rtdb.firebaseio.com/",
  projectId:"said-rahil",
  storageBucket:"said-rahil.firebasestorage.app"
};
firebase.initializeApp(firebaseConfig);
const dbRef=firebase.database();

// ==================== STATE ====================
let csvExperts=[],csvFournisseurs=[],dbData=[];
let isAdmin=false,currentSection='home';
let explorerStack=[];
let pendingDelete=null;
let repFilters={type:null,categorie:null,ville:null,domaine:null,search:''};

// ==================== HELPERS ====================
function $(id){return document.getElementById(id);}
function toast(msg){const t=$('toast');t.innerHTML=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function closeModal(id){$(id).classList.remove('show');}
function showLoading(v){v?$('loadingScreen').classList.remove('hide'):$('loadingScreen').classList.add('hide');}
function escHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function formatPhone(p){if(!p)return'';let c=String(p).replace(/[\s\-\(\)\.]/g,'');if(c.startsWith('00'))c='+'+c.slice(2);else if(c.startsWith('0'))c='+212'+c.slice(1);return c;}
function getInitials(name){const parts=(name||'').trim().split(/\s+/);return parts.slice(0,2).map(p=>p[0]||'').join('').toUpperCase()||'?';}
const COLORS=['#25D366','#128C7E','#075E54','#34B7F1','#25D366','#128C7E','#075E54','#34B7F1'];
function getColor(name){let h=0;for(const c of name||'')h=(h*31+c.charCodeAt(0))&0xffff;return COLORS[h%COLORS.length];}
const catNameMap={services:'Services',products:'Produits',maqola:'Maqaola','yad-amila':'Yad Amila'};
const catClassMap={services:'badge-service',products:'badge-product',maqola:'badge-maqola','yad-amila':'badge-yad'};
const typeMap={'fournisseurs':'FOURNISSEURS','experts':'EXPERTS'};
const categoryMap={'services':'SERVICES','products':'PRODUITS','maqola':'MAQAOLA','yad-amila':'YAD AMILA'};

function normalizeStr(s){
  return String(s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .trim();
}
function fieldMatches(value,q){
  if(!value||!q)return false;
  return normalizeStr(String(value)).includes(normalizeStr(q));
}

// ==================== ADMIN ====================
function openAdminModal(){
  if(isAdmin){logoutAdmin();}
  else{$('adminModal').classList.add('show');}
}
function verifyAdmin(){
  if($('adminPass').value===ADMIN_PASSWORD){
    isAdmin=true;
    sessionStorage.setItem('adminMode','true');
    document.body.classList.add('admin-mode');
    closeModal('adminModal');
    toast('✅ Mode Admin activé');
    renderCurrent();
  }else{toast('❌ Mot de passe incorrect');}
}
function logoutAdmin(){
  isAdmin=false;
  sessionStorage.removeItem('adminMode');
  document.body.classList.remove('admin-mode');
  toast('👤 Mode utilisateur');
  renderCurrent();
}
function checkAdminStatus(){
  if(sessionStorage.getItem('adminMode')==='true'){
    isAdmin=true;
    document.body.classList.add('admin-mode');
  }
}

// ==================== FILTRAGE PAR STATS ====================
function filterByTypeFromStats(type){
  resetRepFilters();
  repFilters.type=type;
  toast(`🔍 ${type==='fournisseurs'?'Fournisseurs':'Experts'}`);
  showSection('repertoire',true);
  renderRepertoire();
}
function filterByCategorieFromStats(categorie){
  resetRepFilters();
  repFilters.categorie=categorie;
  toast(`🔍 ${catNameMap[categorie]}`);
  showSection('repertoire',true);
  renderRepertoire();
}
function filterByVilleFromStats(){
  const villes=[...new Set(dbData.map(d=>d.ville).filter(v=>v&&v!=='null'&&v.trim()))];
  if(villes.length===0){toast('⚠️ Aucune ville');return;}
  showList('Villes',villes.sort(),(ville)=>{if(ville){resetRepFilters();repFilters.ville=ville;toast(`🔍 ${ville}`);showSection('repertoire',true);renderRepertoire();}});
}
function filterByDomaineFromStats(){
  const domaines=[...new Set(dbData.map(d=>d.domaine).filter(d=>d&&d!=='null'&&d.trim()))];
  if(domaines.length===0){toast('⚠️ Aucun domaine');return;}
  showList('Domaines',domaines.sort(),(domaine)=>{if(domaine){resetRepFilters();repFilters.domaine=domaine;toast(`🔍 ${domaine}`);showSection('repertoire',true);renderRepertoire();}});
}

// ==================== REPERTOIRE ====================
function getAvailableCategoriesForCurrentType(){
  let data=[...dbData];
  if(repFilters.type) data=data.filter(d=>d.type===repFilters.type);
  return[...new Set(data.map(d=>d.categorie).filter(c=>c))].map(c=>catNameMap[c]).filter(c=>c);
}
function getFilteredRepertoire(){
  let data=[...dbData];
  if(repFilters.type) data=data.filter(d=>d.type===repFilters.type);
  if(repFilters.categorie) data=data.filter(d=>d.categorie===repFilters.categorie);
  if(repFilters.ville) data=data.filter(d=>normalizeStr(d.ville)===normalizeStr(repFilters.ville));
  if(repFilters.domaine) data=data.filter(d=>normalizeStr(d.domaine)===normalizeStr(repFilters.domaine));
  if(repFilters.search&&repFilters.search.trim()){
    const q=repFilters.search.trim();
    data=data.filter(d=>fieldMatches(d.name,q)||fieldMatches(d.domaine,q)||fieldMatches(d.specialite,q)||fieldMatches(d.ville,q)||fieldMatches(d.phone,q)||fieldMatches(d.email,q)||fieldMatches(d.web,q));
  }
  return data.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
}
function getRepVilles(){
  let data=[...dbData];
  if(repFilters.type) data=data.filter(d=>d.type===repFilters.type);
  if(repFilters.categorie) data=data.filter(d=>d.categorie===repFilters.categorie);
  if(repFilters.domaine) data=data.filter(d=>d.domaine===repFilters.domaine);
  return[...new Set(data.map(d=>d.ville).filter(v=>v&&v!=='null'&&v.trim()))].sort((a,b)=>a.localeCompare(b));
}
function getRepDomaines(){
  let data=[...dbData];
  if(repFilters.type) data=data.filter(d=>d.type===repFilters.type);
  if(repFilters.categorie) data=data.filter(d=>d.categorie===repFilters.categorie);
  if(repFilters.ville) data=data.filter(d=>d.ville===repFilters.ville);
  return[...new Set(data.map(d=>d.domaine).filter(v=>v&&v!=='null'&&v.trim()))].sort((a,b)=>a.localeCompare(b));
}
function resetRepFilters(){
  repFilters={type:null,categorie:null,ville:null,domaine:null,search:''};
  const si=$('searchInput');if(si){si.value='';$('repSearchWrap').classList.remove('search-active');}
  updateRepFilterUI();renderRepertoire();
}
function updateRepFilterUI(){
  $('filterTypeBtn').classList.toggle('active',!!repFilters.type);
  $('filterCatBtn').classList.toggle('active',!!repFilters.categorie);
  $('filterVilleBtn').classList.toggle('active',!!repFilters.ville);
  $('filterDomaineBtn').classList.toggle('active',!!repFilters.domaine);
  const c=$('activeFilters');if(!c)return;
  let h='';
  if(repFilters.type) h+=`<div class="filter-tag"><i class="fas fa-tag"></i> ${repFilters.type==='fournisseurs'?'Fournisseurs':'Experts'} <button onclick="removeRepFilter('type')">✕</button></div>`;
  if(repFilters.categorie) h+=`<div class="filter-tag"><i class="fas fa-layer-group"></i> ${catNameMap[repFilters.categorie]} <button onclick="removeRepFilter('categorie')">✕</button></div>`;
  if(repFilters.ville) h+=`<div class="filter-tag"><i class="fas fa-map-marker-alt"></i> ${escHtml(repFilters.ville)} <button onclick="removeRepFilter('ville')">✕</button></div>`;
  if(repFilters.domaine) h+=`<div class="filter-tag"><i class="fas fa-folder"></i> ${escHtml(repFilters.domaine)} <button onclick="removeRepFilter('domaine')">✕</button></div>`;
  if(repFilters.search) h+=`<div class="filter-tag"><i class="fas fa-search"></i> "${escHtml(repFilters.search)}" <button onclick="removeRepFilter('search')">✕</button></div>`;
  c.innerHTML=h;
}
function removeRepFilter(k){
  if(k==='type')repFilters.type=null;
  else if(k==='categorie')repFilters.categorie=null;
  else if(k==='ville')repFilters.ville=null;
  else if(k==='domaine')repFilters.domaine=null;
  else if(k==='search'){repFilters.search='';const si=$('searchInput');if(si){si.value='';$('repSearchWrap').classList.remove('search-active');}}
  updateRepFilterUI();renderRepertoire();
}
function renderRepertoire(){
  const filtered=getFilteredRepertoire();
  const hasAny=Object.values(repFilters).some(v=>v&&v!='');
  const ri=$('resultInfo');
  if(hasAny){ri.innerHTML=`<i class="fas fa-filter"></i> ${filtered.length} résultat(s)`;ri.classList.add('visible');}
  else{ri.classList.remove('visible');}
  $('contactList').innerHTML=filtered.length
    ?filtered.map(i=>buildContactRow(i)).join('')
    :`<div class="empty-state"><div class="empty-icon"><i class="fas fa-user-slash"></i></div><div class="empty-title">Aucun résultat</div><div class="empty-sub">Modifiez vos filtres</div></div>`;
  updateRepFilterUI();
}
function buildContactRow(item){
  const color=getColor(item.name);
  const init=getInitials(item.name);
  let details=[];
  if(item.domaine) details.push(item.domaine);
  if(item.ville) details.push(item.ville);
  if(item.specialite && item.specialite!=='Général') details.push(item.specialite);
  let badges='';
  badges+=`<span class="badge ${item.type==='fournisseurs'?'badge-fourn':'badge-expert'}">${item.type==='fournisseurs'?'Fournisseur':'Expert'}</span>`;
  if(item.categorie&&catNameMap[item.categorie]) badges+=`<span class="badge ${catClassMap[item.categorie]}">${catNameMap[item.categorie]}</span>`;
  const enc=encodeURIComponent(JSON.stringify(item));
  return`<div class="contact-item" onclick="openDetailModal('${enc}')">
    <div class="contact-avatar" style="background:${color}">${init}</div>
    <div class="contact-info">
      <div class="contact-name">${escHtml(item.name)}</div>
      <div class="contact-details">${details.length?escHtml(details.join(' · ')):'Aucune info'}</div>
      <div class="contact-badges">${badges}</div>
    </div>
  </div>`;
}

// ==================== DETAIL MODAL ====================
function openDetailModal(enc){
  const item=JSON.parse(decodeURIComponent(enc));
  const color=getColor(item.name);
  $('modalAvatar').style.background=color;
  $('modalAvatar').textContent=getInitials(item.name);
  $('modalName').textContent=item.name;
  $('modalType').textContent=item.domaine||(item.type==='fournisseurs'?'Fournisseur':'Expert');
  let bh='';
  bh+=`<span class="badge ${item.type==='fournisseurs'?'badge-fourn':'badge-expert'}">${item.type==='fournisseurs'?'Fournisseur':'Expert'}</span>`;
  if(item.categorie&&catNameMap[item.categorie]) bh+=`<span class="badge ${catClassMap[item.categorie]}">${catNameMap[item.categorie]}</span>`;
  $('modalBadges').innerHTML=bh;
  const hp=item.phone&&item.phone!='null'&&item.phone.trim();
  const he=item.email&&item.email!='null'&&item.email.trim();
  const hw=item.web&&item.web!='null'&&item.web.startsWith('http');
  const rows=[
    item.domaine&&{icon:'fa-folder',label:'Domaine',value:item.domaine},
    item.specialite&&item.specialite!='Général'&&{icon:'fa-cog',label:'Spécialité',value:item.specialite},
    item.ville&&{icon:'fa-map-marker-alt',label:'Ville',value:item.ville},
    hp&&{icon:'fa-phone-alt',label:'Téléphone',value:item.phone},
    he&&{icon:'fa-envelope',label:'Email',value:item.email},
    hw&&{icon:'fa-globe',label:'Site Web',value:item.web},
  ].filter(Boolean);
  $('modalBody').innerHTML=rows.map(r=>`<div class="modal-row"><div class="modal-icon"><i class="fas ${r.icon}"></i></div><div><div class="modal-row-label">${r.label}</div><div class="modal-row-value">${escHtml(r.value)}</div></div></div>`).join('');
  let ah='';
  if(hp){
    ah+=`<button class="modal-btn" onclick="window.location.href='tel:${item.phone}'"><i class="fas fa-phone-alt"></i><span>Appeler</span></button>`;
    let wa=item.phone.replace(/[^0-9+]/g,'');
    if(wa.startsWith('0')) wa='212'+wa.substring(1);
    if(wa.startsWith('+')) wa=wa.substring(1);
    ah+=`<button class="modal-btn whatsapp" onclick="window.open('https://wa.me/${wa}','_blank')"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></button>`;
  }
  if(he) ah+=`<button class="modal-btn" onclick="window.location.href='mailto:${item.email}'"><i class="fas fa-envelope"></i><span>Email</span></button>`;
  if(hw) ah+=`<button class="modal-btn" onclick="window.open('${item.web}','_blank')"><i class="fas fa-globe"></i><span>Site Web</span></button>`;
  if(hp) ah+=`<button class="modal-btn" onclick="saveVCF('${escHtml(item.name)}','${item.phone}','${item.email||''}','${item.web||''}')"><i class="fas fa-save"></i><span>Contact</span></button>`;
  if(isAdmin&&item.id){
    ah+=`<div style="display:flex;gap:10px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);width:100%;justify-content:center">
      <button class="modal-btn" onclick="closeDetailModal();openEditModal('${item.id}')"><i class="fas fa-pen"></i><span>Modifier</span></button>
      <button class="modal-btn" onclick="closeDetailModal();openDeleteModal('${item.id}')"><i class="fas fa-trash-alt"></i><span>Supprimer</span></button>
    </div>`;
  }
  $('modalActions').innerHTML=ah;
  $('detailModal').classList.add('show');
}
function closeDetailModal(){$('detailModal').classList.remove('show');}
function saveVCF(n,p,e,w){
  const d=`BEGIN:VCARD\nVERSION:3.0\nFN:${n}\nTEL:${p}\n${e?'EMAIL:'+e+'\n':''}${w?'URL:'+w+'\n':''}END:VCARD`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([d],{type:'text/vcard'}));
  a.download=`${n.replace(/[^a-z0-9]/gi,'_')}.vcf`;document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('📇 Contact sauvegardé');
}

// ==================== FILTER MODALS ====================
let _listSelectFn=null;

  _listSelectFn=onSelect;
  $('listItems').innerHTML=`<div class="menu-item" onclick="_listSelectFn(null);closeModal('listModal')"><div class="menu-icon"><i class="fas fa-undo"></i></div><span class="menu-label">Tous</span></div>`+items.map(item=>`<div class="menu-item" onclick="_listSelectFn('${escHtml(item)}');closeModal('listModal')"><div class="menu-icon"><i class="fas fa-tag"></i></div><span class="menu-label">${escHtml(item)}</span></div>`).join('');
  $('listModal').classList.add('show');
}
function showTypeFilter(){

    if(v==='Fournisseurs')repFilters.type='fournisseurs';
    else if(v==='Experts')repFilters.type='experts';
    else repFilters.type=null;
    repFilters.categorie=null;
    renderRepertoire();
  });
}
function showCatFilter(){
  let cats=getAvailableCategoriesForCurrentType();
  if(cats.length===0){toast('⚠️ Aucune catégorie');return;}
  showList('Catégorie',cats,v=>{

    else if(v==='Yad Amila')repFilters.categorie='yad-amila';

function showVilleFilter(){const v=getRepVilles();if(!v.length){toast('⚠️ Aucune ville');return;}showList('Villes',v,val=>{repFilters.ville=val;renderRepertoire();});}
function showDomaineFilter(){const d=getRepDomaines();if(!d.length){toast('⚠️ Aucun domaine');return;}showList('Domaines',d,val=>{repFilters.domaine=val;renderRepertoire();});}

// ==================== EXPLORER ====================
function renderExplorer(){
  const bc=$('explorerBreadcrumb');
  let bch=`<div class="bc" onclick="goExplorerLevel(0)"><i class="fas fa-home"></i> Accueil</div>`;
  explorerStack.forEach((item,idx)=>{
    let label='';
    if(item.type) label=item.type==='fournisseurs'?'Fournisseurs':'Experts';
    else if(item.domaine) label=item.domaine;
    else if(item.specialite) label=item.specialite;
    bch+=`<span class="bc-sep">›</span><div class="bc" onclick="goExplorerLevel(${idx+1})">${escHtml(label)}</div>`;
  });
  bc.innerHTML=bch;
  const c=$('explorerContent');
  if(explorerStack.length===0){
    c.innerHTML=`<div class="explorer-item" onclick="explorerNavigateTo('type','fournisseurs')"><div class="explorer-icon"><i class="fas fa-industry"></i></div><div><div class="explorer-name">Fournisseurs</div><div class="explorer-count">${dbData.filter(d=>d.type==='fournisseurs').length} professionnels</div></div><i class="fas fa-chevron-right explorer-arrow"></i></div><div class="explorer-item" onclick="explorerNavigateTo('type','experts')"><div class="explorer-icon" style="background:rgba(37,211,102,0.1);color:#25D366"><i class="fas fa-microchip"></i></div><div><div class="explorer-name">Experts</div><div class="explorer-count">${dbData.filter(d=>d.type==='experts').length} professionnels</div></div><i class="fas fa-chevron-right explorer-arrow"></i></div>`;
  }else if(explorerStack.length===1){
    const type=explorerStack[0].type;
    const domaines={};
    dbData.filter(d=>d.type===type).forEach(i=>{const d=i.domaine||'Autre';domaines[d]=(domaines[d]||0)+1;});
    c.innerHTML=Object.entries(domaines).sort().map(([d,cnt])=>`<div class="explorer-item" onclick="explorerNavigateTo('domaine','${escHtml(d)}')"><div class="explorer-icon"><i class="fas fa-folder"></i></div><div><div class="explorer-name">${escHtml(d)}</div><div class="explorer-count">${cnt} professionnels</div></div><i class="fas fa-chevron-right explorer-arrow"></i></div>`).join('');
  }else if(explorerStack.length===2){
    const type=explorerStack[0].type,domaine=explorerStack[1].domaine;
    const specs={};
    dbData.filter(d=>d.type===type&&(d.domaine||'Autre')===domaine).forEach(i=>{const s=i.specialite||'Général';specs[s]=(specs[s]||0)+1;});
    c.innerHTML=Object.entries(specs).sort().map(([s,cnt])=>`<div class="explorer-item" onclick="explorerNavigateTo('specialite','${escHtml(s)}')"><div class="explorer-icon" style="background:rgba(255,140,0,0.1);color:#FF8C00"><i class="fas fa-cog"></i></div><div><div class="explorer-name">${escHtml(s)}</div><div class="explorer-count">${cnt} spécialistes</div></div><i class="fas fa-chevron-right explorer-arrow"></i></div>`).join('');
  }else{
    const type=explorerStack[0].type,domaine=explorerStack[1].domaine,specialite=explorerStack[2].specialite;
    const items=dbData.filter(d=>d.type===type&&(d.domaine||'Autre')===domaine&&(d.specialite||'Général')===specialite);
    c.innerHTML=items.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(i=>buildContactRow(i)).join('');
  }
}
function goExplorerLevel(l){explorerStack=explorerStack.slice(0,l);renderExplorer();}
function explorerNavigateTo(t,v){
  if(t==='type')explorerStack=[{type:v}];
  else if(t==='domaine')explorerStack.push({domaine:v});
  else if(t==='specialite')explorerStack.push({specialite:v});
  renderExplorer();
}

// ==================== STATS & CRUD ====================
function updateStats(){
  $('statFour').textContent=dbData.filter(d=>d.type==='fournisseurs').length;
  $('statExp').textContent=dbData.filter(d=>d.type==='experts').length;
  $('statVilles').textContent=new Set(dbData.map(d=>d.ville).filter(v=>v&&v!='null'&&v.trim())).size;
  $('statDomaines').textContent=new Set(dbData.map(d=>d.domaine).filter(d=>d&&d!='null'&&d.trim())).size;
  $('statServices').textContent=dbData.filter(d=>d.categorie==='services').length;
  $('statProduits').textContent=dbData.filter(d=>d.categorie==='products').length;
  $('statMaqola').textContent=dbData.filter(d=>d.categorie==='maqola').length;
  $('statYadAmila').textContent=dbData.filter(d=>d.categorie==='yad-amila').length;
}
function openAddModal(){
  if(!isAdmin){toast('⚠️ Accès réservé admin');return;}
  $('editTitle').innerHTML='<i class="fas fa-plus-circle"></i> Ajouter';
  ['editId','editName','editDomaine','editSpecialite','editVille','editPhone','editEmail','editWeb'].forEach(id=>$(id).value='');
  $('editType').value='fournisseurs';$('editCat').value='services';
  $('editModal').classList.add('show');
}
function openEditModal(id){
  if(!isAdmin){toast('⚠️ Accès réservé admin');return;}
  const item=dbData.find(i=>i.id===id);if(!item)return;
  $('editTitle').innerHTML='<i class="fas fa-pen"></i> Modifier';
  $('editId').value=item.id;$('editName').value=item.name;
  $('editType').value=item.type;$('editCat').value=item.categorie;
  $('editDomaine').value=item.domaine||'';$('editSpecialite').value=item.specialite||'';
  $('editVille').value=item.ville||'';$('editPhone').value=item.phone||'';
  $('editEmail').value=item.email||'';$('editWeb').value=item.web||'';
  $('editModal').classList.add('show');
}
async function saveItem(){
  if(!isAdmin){toast('⚠️ Accès réservé admin');return;}
  const id=$('editId').value;
  const itemData={
    id:id||`${Date.now()}_${Math.random().toString(36).slice(2)}`,
    name:$('editName').value.trim(),type:$('editType').value,
    categorie:$('editCat').value,domaine:$('editDomaine').value||'Autre',
    specialite:$('editSpecialite').value||'Général',
    ville:$('editVille').value||'',phone:formatPhone($('editPhone').value),
    email:$('editEmail').value||'',web:$('editWeb').value||''
  };
  if(!itemData.name){toast('⚠️ Nom requis');return;}
  showLoading(true);
  try{
    const oldItem=id?dbData.find(i=>i.id===id):null;
    if(oldItem&&(oldItem.type!==itemData.type||oldItem.categorie!==itemData.categorie)){
      const op=`professionals/${typeMap[oldItem.type]}/${categoryMap[oldItem.categorie]}`;
      const os=await dbRef.ref(op).once('value');
      await dbRef.ref(op).set((os.val()||[]).filter(i=>i.id!==id));
    }
    const path=`professionals/${typeMap[itemData.type]}/${categoryMap[itemData.categorie]}`;
    const snap=await dbRef.ref(path).once('value');
    let arr=snap.val()||[];
    const idx=arr.findIndex(i=>i.id===id);
    if(idx!==-1)arr[idx]=itemData;else arr.push(itemData);
    await dbRef.ref(path).set(arr);
    toast(id?'✅ Modifié':'✅ Ajouté');
    closeModal('editModal');
    await loadDB();
    resetRepFilters();
  }catch(e){toast('❌ Erreur: '+e.message);}
  showLoading(false);
}
function openDeleteModal(id){
  if(!isAdmin){toast('⚠️ Accès réservé admin');return;}
  const item=dbData.find(i=>i.id===id);if(!item)return;
  pendingDelete=item;
  $('deleteMsg').innerHTML=`Supprimer <strong>${escHtml(item.name)}</strong> ?`;
  $('deleteModal').classList.add('show');
}
async function confirmDeleteItem(){
  if(!isAdmin||!pendingDelete)return;
  showLoading(true);
  try{
    const path=`professionals/${typeMap[pendingDelete.type]}/${categoryMap[pendingDelete.categorie]}`;
    const snap=await dbRef.ref(path).once('value');
    await dbRef.ref(path).set((snap.val()||[]).filter(i=>i.id!==pendingDelete.id));
    toast('🗑️ Supprimé');closeModal('deleteModal');pendingDelete=null;
    await loadDB();resetRepFilters();
  }catch(e){toast('❌ Erreur');}
  showLoading(false);
}
async function syncToFirebase(){
  if(!isAdmin){toast('⚠️ Accès réservé admin');return;}
  if(!confirm('Synchroniser les CSV ?'))return;
  showLoading(true);
  try{
    const structure={"FOURNISSEURS":{"SERVICES":[],"PRODUITS":[],"MAQAOLA":[],"YAD AMILA":[]},"EXPERTS":{"SERVICES":[],"PRODUITS":[],"MAQAOLA":[],"YAD AMILA":[]}};
    csvFournisseurs.forEach((s,i)=>{structure["FOURNISSEURS"]["SERVICES"].push({id:`four_${Date.now()}_${i}`,...s});});
    csvExperts.forEach((e,i)=>{structure["EXPERTS"]["YAD AMILA"].push({id:`exp_${Date.now()}_${i}`,...e});});
    await dbRef.ref('professionals').set(structure);
    toast('✅ Synchronisation réussie');await loadDB();
  }catch(e){toast('❌ Erreur: '+e.message);}
  showLoading(false);
}
async function loadCSV(url){
  try{
    const res=await fetch(url);const text=await res.text();
    const lines=text.split(/\r?\n/);const data=[];
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(',');
      if(cols[1]){
        data.push({
          name:cols[1]?.replace(/["']/g,'').trim()||'',
          domaine:cols[2]?.replace(/["']/g,'').trim()||'Autre',
          specialite:cols[3]?.replace(/["']/g,'').trim()||'Général',
          ville:cols[4]?.replace(/["']/g,'').trim()||'',
          phone:formatPhone(cols[5]?.replace(/["']/g,'').trim()),
          email:cols[6]?.replace(/["']/g,'').trim()||'',
          web:cols[7]?.replace(/["']/g,'').trim()||''
        });
      }
    }
    return data;
  }catch(e){return[];}
}
async function loadDB(){
  try{
    const snap=await dbRef.ref('professionals').once('value');
    const data=snap.val();dbData=[];
    if(data){
      for(const[ft,to]of Object.entries(data)){
        const type=ft==='FOURNISSEURS'?'fournisseurs':'experts';
        for(const[fc,items]of Object.entries(to)){
          let cat=null;
          if(fc==='SERVICES')cat='services';
          else if(fc==='PRODUITS')cat='products';
          else if(fc==='MAQAOLA')cat='maqola';
          else if(fc==='YAD AMILA')cat='yad-amila';
          if(!cat||!Array.isArray(items))continue;
          for(const item of items){
            if(item?.name)dbData.push({...item,type,categorie:cat,id:item.id||`${type}_${Date.now()}_${Math.random()}`});
          }
        }
      }
    }
    dbData.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    updateStats();renderCurrent();
  }catch(e){toast('❌ Erreur chargement');}
}

// ==================== NAVIGATION ====================
function showSection(id,reset=true){
  if(reset){
    if(id!=='explorer')explorerStack=[];
    if(id!=='repertoire')resetRepFilters();
  }
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  $(id+'Section').classList.add('active');
  document.querySelectorAll('.nav-item[data-sec]').forEach(b=>b.classList.remove('active'));
  const tb=document.querySelector(`.nav-item[data-sec="${id}"]`);
  if(tb)tb.classList.add('active');
  currentSection=id;
  if(id==='repertoire')renderRepertoire();
  else if(id==='explorer')renderExplorer();
  window.scrollTo({top:0,behavior:'smooth'});
}
function handleSectionClick(id){
  if(currentSection===id){
    if(window.scrollY>10)window.scrollTo({top:0,behavior:'smooth'});
    else if(id==='repertoire'){resetRepFilters();toast('🔍 Filtres réinitialisés');}
    else if(id==='explorer'){explorerStack=[];renderExplorer();toast('↺ Explorer réinitialisé');}
  }else showSection(id,true);
}
function renderCurrent(){
  if(currentSection==='repertoire')renderRepertoire();
  else if(currentSection==='explorer')renderExplorer();
}

// ==================== PWA INSTALL ====================
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();deferredPrompt=e;
  setTimeout(()=>{
    const btn=document.createElement('button');
    btn.innerHTML='<i class="fas fa-download"></i> Installer';
    btn.style.cssText='position:fixed;bottom:90px;right:16px;background:#25D366;color:white;border:none;border-radius:50px;padding:10px 18px;z-index:200;font-size:0.75rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.3);';
    btn.onclick=()=>{deferredPrompt.prompt();btn.remove();};
    document.body.appendChild(btn);
  },2000);
});
